<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cinemascopome">
<meta name="theme-color" content="#000">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Cinemascopome</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#app{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;height:100dvh}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
video.mirror{transform:scaleX(-1)}
canvas{position:absolute;inset:0;z-index:3;pointer-events:none}
#lb-t,#lb-b{position:absolute;left:0;right:0;background:#000;z-index:2;pointer-events:none}
#lb-l,#lb-r{position:absolute;top:0;bottom:0;background:#000;z-index:2;pointer-events:none}

/* ── TOP STATUS BAR ── */
#top{
position:relative;z-index:10;flex-shrink:0;
background:rgba(10,10,10,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,.06);
padding:max(env(safe-area-inset-top),6px) 16px 8px;
display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.top-toggles{display:flex;align-items:center;gap:5px}
.tgl{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.tgl.on{background:rgba(245,196,0,.14);border-color:#F5C400;color:#F5C400}
.tgl:active{opacity:.4}
.top-center{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.top-fmt{font:700 14px/1 ‘Noto Sans’,sans-serif;letter-spacing:.1em;color:#F5C400}
.top-ratio{font:300 9px/1 ‘Noto Sans’,sans-serif;letter-spacing:.12em;color:rgba(255,255,255,.4)}
.top-right{display:flex;align-items:center;gap:6px}
#lut-badge{font:600 9px/1 ‘Share Tech Mono’,monospace;letter-spacing:.1em;color:#F5C400;background:rgba(0,0,0,.6);padding:3px 7px;border-radius:3px;border:1px solid rgba(245,196,0,.3);display:none;white-space:nowrap}
.tgl-set{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0}
.tgl-set:active{opacity:.4}

/* ── VIEWFINDER ── */
#vf{position:relative;z-index:2;flex:1;min-height:0}
#rec-timer{position:absolute;top:12px;left:50%;transform:translateX(-50%);font:700 11px/1 ‘Share Tech Mono’,monospace;letter-spacing:.1em;color:#ff4444;background:rgba(0,0,0,.65);padding:4px 10px;border-radius:4px;z-index:8;display:none;pointer-events:none;border:1px solid rgba(255,68,68,.35)}
#rec-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff4444;margin-right:5px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ── FLOAT CONTROLS (format / lut / lens) ── */
#float-ctrl{
position:relative;z-index:10;flex-shrink:0;
background:rgba(10,10,10,.88);
}
#lut-row{display:flex;overflow-x:auto;gap:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid rgba(255,255,255,.05)}
#lut-row::-webkit-scrollbar{display:none}
.lut-btn{flex-shrink:0;padding:6px 9px;border:none;border-right:1px solid rgba(255,255,255,.05);background:none;cursor:pointer;-webkit-appearance:none;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:52px;transition:.15s}
.lut-btn:last-child{border-right:none}
.lut-btn.on{background:rgba(245,196,0,.08)}
.lut-btn:active{opacity:.5}
.lut-sw{width:28px;height:16px;border-radius:3px;border:1.5px solid rgba(255,255,255,.1);flex-shrink:0}
.lut-btn.on .lut-sw{border-color:#F5C400}
.lut-nm{font:400 7px/1 ‘Noto Sans’,sans-serif;letter-spacing:.08em;color:rgba(255,255,255,.3);white-space:nowrap}
.lut-btn.on .lut-nm{color:#F5C400}
#lens-row{display:none;align-items:center;justify-content:center;gap:5px;padding:5px 14px 0}
.lpill{padding:4px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);font:600 11px/1 ‘Noto Sans’,sans-serif;letter-spacing:.06em;color:rgba(255,255,255,.38);cursor:pointer;-webkit-appearance:none;transition:.15s}
.lpill.on{border-color:#F5C400;background:rgba(245,196,0,.12);color:#F5C400}
.lpill:active{opacity:.5}
#zoom-row{display:none;align-items:center;gap:8px;padding:4px 18px 0}
.zoom-icon{font:9px ‘Share Tech Mono’,monospace;color:rgba(255,255,255,.28);flex-shrink:0}
.zoom-val{font:10px ‘Share Tech Mono’,monospace;color:#F5C400;min-width:28px;text-align:right;flex-shrink:0}
input[type=range].slider{flex:1;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.15);border-radius:2px;outline:none;cursor:pointer}
input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#F5C400;border:2px solid rgba(255,255,255,.4);cursor:pointer}
#pills-row{display:flex;padding:4px 0 0;justify-content:center;gap:0;border-bottom:1px solid rgba(255,255,255,.05)}
.fpill{padding:5px 12px;font:600 10px/1 ‘Noto Sans’,sans-serif;letter-spacing:.1em;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;-webkit-appearance:none;position:relative;transition:.15s}
.fpill.on{color:#F5C400}
.fpill.on::after{content:’’;position:absolute;bottom:-1px;left:20%;right:20%;height:1.5px;background:#F5C400;border-radius:1px}
.fpill:active{opacity:.5}

/* ── HARDWARE PANEL ── */
#hw-panel{
position:relative;z-index:10;flex-shrink:0;
background:#111;
border-radius:22px 22px 0 0;
border-top:1px solid rgba(255,255,255,.08);
padding-bottom:max(env(safe-area-inset-bottom),10px);
box-shadow:0 -8px 40px rgba(0,0,0,.6);
}

/* Info strip */
#hw-info{
display:flex;align-items:stretch;
border-bottom:1px solid rgba(255,255,255,.06);
padding:10px 16px 8px;
gap:0;
}
.hw-stat{
display:flex;flex-direction:column;align-items:center;gap:3px;
flex:1;position:relative;
}
.hw-stat + .hw-stat::before{
content:’’;position:absolute;left:0;top:10%;bottom:10%;
width:1px;background:rgba(255,255,255,.08);
}
.hw-val{font:700 18px/1 ‘Share Tech Mono’,monospace;letter-spacing:-.01em;color:rgba(255,255,255,.88)}
.hw-key{font:400 8px/1 ‘Noto Sans’,sans-serif;letter-spacing:.18em;color:rgba(255,255,255,.3);text-transform:uppercase}
/* Mode/FPS/codec in info strip */
.hw-stat-sm{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1.4}
#mode-fps-row{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 2px;gap:8px}
.mode-grp{display:flex;gap:0}
.mode-btn{padding:4px 12px;font:600 9px/1 ‘Noto Sans’,sans-serif;letter-spacing:.12em;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;-webkit-appearance:none;position:relative;transition:.15s}
.mode-btn.on{color:#F5C400}
.mode-btn.on::after{content:’’;position:absolute;bottom:-1px;left:15%;right:15%;height:1.5px;background:#F5C400;border-radius:1px}
.mode-btn:active{opacity:.5}
#fps-row{display:none;align-items:center;gap:4px}
.fps-btn{padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.4);font:600 9px/1 ‘Noto Sans’,sans-serif;letter-spacing:.05em;color:rgba(255,255,255,.32);cursor:pointer;-webkit-appearance:none;transition:.15s;flex-shrink:0}
.fps-btn.on{border-color:#F5C400;background:rgba(245,196,0,.12);color:#F5C400}
.fps-btn:active{opacity:.5}
#codec-row{display:none;align-items:center;gap:4px}
.codec-btn{padding:3px 8px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.4);font:600 9px/1 ‘Noto Sans’,sans-serif;letter-spacing:.05em;color:rgba(255,255,255,.32);cursor:pointer;-webkit-appearance:none;transition:.15s}
.codec-btn.on{border-color:#F5C400;background:rgba(245,196,0,.12);color:#F5C400}
.codec-btn:active{opacity:.5}

/* Main controls row */
#hw-controls{
display:flex;align-items:center;justify-content:space-between;
padding:10px 20px 8px;
background:rgba(30,22,14,.55);
border-radius:16px;
margin:6px 10px 4px;
}

/* Gallery thumb */
#gal-thumb-btn{
width:56px;height:56px;border-radius:10px;overflow:hidden;
background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);
cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;
flex-shrink:0;transition:.15s;position:relative;
}
#gal-thumb-btn img{width:100%;height:100%;object-fit:cover;display:none}
.gal-thumb-empty{color:rgba(255,255,255,.28)}
.gal-thumb-cnt{position:absolute;bottom:2px;right:3px;font:700 8px/1 ‘Share Tech Mono’,monospace;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9)}
#gal-thumb-btn:active{opacity:.6}

/* Shutter / REC */
.shoot-area{display:flex;flex-direction:column;align-items:center;gap:0}
/* Shutter knob — big hardware dial */
#cap{
background:none;border:none;cursor:pointer;-webkit-appearance:none;
width:76px;height:76px;border-radius:50%;
background:radial-gradient(circle at 35% 30%, #d8d8d8, #888 55%, #555);
box-shadow:0 4px 16px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.15) inset, 0 -1px 0 rgba(0,0,0,.4) inset;
display:flex;align-items:center;justify-content:center;
position:relative;transition:box-shadow .1s,transform .1s;
}
#cap::after{
content:’’;position:absolute;inset:8px;border-radius:50%;
border:1.5px solid rgba(255,255,255,.12);
}
#cap:active{
transform:scale(.94);
box-shadow:0 2px 8px rgba(0,0,0,.8), 0 0 0 3px rgba(245,196,0,.5);
}
#rec-btn{
background:none;border:none;cursor:pointer;-webkit-appearance:none;
width:76px;height:76px;border-radius:50%;
background:radial-gradient(circle at 35% 30%, #cc3333, #661111 60%);
box-shadow:0 4px 16px rgba(0,0,0,.7), 0 1px 0 rgba(255,80,80,.25) inset;
display:flex;align-items:center;justify-content:center;
transition:box-shadow .1s,transform .1s;
}
#rec-btn.recording{
background:radial-gradient(circle at 35% 30%, #ff4444, #aa1111 60%);
box-shadow:0 4px 16px rgba(255,0,0,.4), 0 0 0 4px rgba(255,68,68,.3);
}
#rec-btn:active{transform:scale(.94)}
.rec-sq{width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,.9);transition:.2s}
.rec-sq.recording{border-radius:3px;width:20px;height:20px}

/* Mode selector (M S I style) */
.mode-sel{display:flex;align-items:center;gap:4px}
.msi{
width:36px;height:36px;border-radius:50%;
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
color:rgba(255,255,255,.35);font:600 11px/1 ‘Noto Sans’,sans-serif;
cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;
transition:.15s;flex-shrink:0;
}
.msi.on{background:rgba(245,196,0,.16);border-color:#F5C400;color:#F5C400}
.msi:active{opacity:.4}

/* Flip */
#flip-btn{
width:48px;height:48px;border-radius:50%;
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
color:rgba(255,255,255,.5);cursor:pointer;-webkit-appearance:none;
display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;
}
#flip-btn:active{opacity:.4;transform:scale(.9)}

/* TOAST */
#toast{position:absolute;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#F5C400;font:600 10px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;padding:9px 18px;z-index:99;opacity:0;pointer-events:none;white-space:nowrap;border:1.5px solid #F5C400;border-radius:6px;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#toast.accent{background:#F5C400;color:#000;border-color:#F5C400}
/* FOCUS */
#focus{position:absolute;width:52px;height:52px;margin:-26px 0 0 -26px;z-index:6;pointer-events:none;opacity:0;transition:opacity .4s}
.fc{position:absolute;width:10px;height:10px;border-color:#F5C400;border-style:solid}
.fc.tl{top:0;left:0;border-width:1.5px 0 0 1.5px}
.fc.tr{top:0;right:0;border-width:1.5px 1.5px 0 0}
.fc.bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.fc.br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}
/* GALLERY */
#gallery{position:absolute;inset:0;z-index:50;background:#0a0a0a;display:none;flex-direction:column}
.gh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;background:#1a1a1a}
.gh-title{font:700 17px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;color:#fff}
.gh-count{font:300 10px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;color:rgba(255,255,255,.35)}
.gh-right{display:flex;align-items:center;gap:8px}
.g-all{padding:6px 12px;border:1px solid rgba(245,196,0,.4);background:none;color:#F5C400;font:600 10px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;cursor:pointer;-webkit-appearance:none;border-radius:4px}
.g-all:active{background:rgba(245,196,0,.12)}
.g-close{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:none;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.g-close:active{opacity:.5}
#g-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;align-content:start}
.g-thumb{position:relative;aspect-ratio:2.39/1;background:#1a1a1a;cursor:pointer;overflow:hidden}
.g-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.g-thumb-bar{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:rgba(0,0,0,.6);display:flex;justify-content:space-between}
.g-thumb-fmt{font:600 7px/1 ‘Noto Sans’,sans-serif;letter-spacing:.08em;color:#F5C400}
.g-thumb-cs{font:9px/1 ‘Share Tech Mono’,monospace;color:rgba(255,255,255,.4)}
.g-thumb:active{opacity:.7}
.g-empty{grid-column:1/-1;padding:60px 0;text-align:center;font:300 11px/2 ‘Noto Sans’,sans-serif;letter-spacing:.18em;color:rgba(255,255,255,.2)}
#g-detail{position:absolute;inset:0;background:#000;z-index:51;display:none;flex-direction:column}
.gd-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:#1a1a1a;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
.gd-back{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;-webkit-appearance:none;font:300 12px/1 ‘Noto Sans’,sans-serif;letter-spacing:.1em}
.gd-back:active{opacity:.5}
.gd-save{padding:8px 20px;border:1px solid rgba(245,196,0,.5);background:none;color:#F5C400;font:600 11px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;cursor:pointer;-webkit-appearance:none}
.gd-save:active{background:rgba(245,196,0,.12)}
#g-detail-img{flex:1;object-fit:contain;width:100%;min-height:0}
.gd-info{padding:10px 18px 14px;background:#111;flex-shrink:0}
.gd-fname{font:9px/1.8 ‘Share Tech Mono’,monospace;color:rgba(255,255,255,.35);word-break:break-all}
#settings{position:absolute;inset:0;z-index:50;background:#0a0a0a;display:none;flex-direction:column}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;background:#1a1a1a}
.sh-title{font:700 17px/1 ‘Noto Sans’,sans-serif;letter-spacing:.14em;color:#fff}
.sh-close{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:none;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.sh-close:active{opacity:.5}
.sh-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px}
.sh-sec{margin-bottom:28px}
.sh-sec-title{font:300 9px/1 ‘Noto Sans’,sans-serif;letter-spacing:.24em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.sh-opts{display:flex;flex-direction:column;gap:2px}
.sh-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);cursor:pointer;-webkit-appearance:none;width:100%;transition:.15s}
.sh-opt.on{border-color:rgba(245,196,0,.45);background:rgba(245,196,0,.1)}
.sh-opt:active{opacity:.6}
.sh-opt-l{display:flex;flex-direction:column;gap:3px;text-align:left}
.sh-opt-name{font:600 13px/1 ‘Noto Sans’,sans-serif;letter-spacing:.08em;color:rgba(255,255,255,.75)}
.sh-opt.on .sh-opt-name{color:#F5C400}
.sh-opt-desc{font:300 9px/1.5 ‘Noto Sans’,sans-serif;letter-spacing:.1em;color:rgba(255,255,255,.3)}
.sh-opt-badge{font:9px/1 ‘Share Tech Mono’,monospace;padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.35)}
.sh-opt.on .sh-opt-badge{border-color:rgba(245,196,0,.4);color:#F5C400;background:rgba(245,196,0,.1)}
.sh-fname{margin-top:8px;padding:12px 14px;border-radius:8px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.07)}
.sh-fname-lbl{font:300 8px/1 ‘Noto Sans’,sans-serif;letter-spacing:.2em;color:rgba(255,255,255,.3);margin-bottom:6px}
.sh-fname-val{font:9px/1.7 ‘Share Tech Mono’,monospace;color:#F5C400;word-break:break-all}
</style>

</head>
<body>
<div id="app">
  <video id="vid" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="cv"></canvas>
  <div id="lb-t"></div><div id="lb-b"></div>
  <div id="lb-l"></div><div id="lb-r"></div>

  <!-- TOP STATUS BAR -->

  <div id="top">
    <div class="top-toggles">
      <button class="tgl" id="gridBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="1.5" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="1" x2="6" y2="15" stroke="currentColor" stroke-width="1"/><line x1="10" y1="1" x2="10" y2="15" stroke="currentColor" stroke-width="1"/><line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1"/><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="tgl" id="safeBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 4L1 1L4 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12 1L15 1L15 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M15 12L15 15L12 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 15L1 15L1 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button class="tgl" id="maskBtn"><span id="mask-ico"></span></button>
    </div>
    <div class="top-center">
      <div class="top-fmt" id="t-name">CINEMASCOPE</div>
      <div class="top-ratio" id="t-ratio">2.39 : 1</div>
    </div>
    <div class="top-right">
      <div id="lut-badge"></div>
      <button class="tgl-set" id="setBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.2"/><path d="M8 1v1.8M8 13.2V15M1 8h1.8M13.2 8H15M3.1 3.1l1.2 1.2M11.7 11.7l1.2 1.2M12.9 3.1l-1.2 1.2M4.3 11.7l-1.2 1.2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  {lbl:'Dim',   alpha:0.62, svg:'<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9C3.5 4 14.5 4 17 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1 9C3.5 13.5 14.5 13.5 17 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".35" stroke-dasharray="3 2"/><circle cx="9" cy="9" r="2.5" fill="currentColor" opacity=".55"/></svg>'},

FMTS.forEach((f, i) => {

// ── METRICS ───────────────────────────────────────────────────────────────────
function getM() {
  const W = window.innerWidth, H = window.innerHeight;
  const tH = topEl.offsetHeight || 52;
  const cH = (document.getElementById('float-ctrl').offsetHeight||80) + (document.getElementById('hw-panel').offsetHeight||200);
  const fH = H - tH - cH;
  const r  = FMTS[fi].r;
  const ah = W / r;
  if (ah <= fH) {
    const ex = (fH - ah) / 2;
    return { W, H, tH, cH, aL:0, aT:tH+ex, aW:W, aH:ah };
  } else {
    const aw = fH * r;
    return { W, H, tH, cH, aL:(W-aw)/2, aT:tH, aW:aw, aH:fH };
  }
}

// ── LETTERBOX BARS ────────────────────────────────────────────────────────────
function updateBars() {
  const m = getM();
  const alpha = MASK[maskMode].alpha;
  const col = alpha > 0 ? `rgba(0,0,0,${alpha})` : 'transparent';

  // top strip: below topBar, above frame
  const topH = Math.max(0, m.aT - m.tH);
  lbT.style.top    = m.tH + 'px';
  lbT.style.height = topH + 'px';
  lbT.style.background = col;

  // bottom strip: below frame, above card
  const botStart = m.aT + m.aH;
  const botH = Math.max(0, (m.H - m.cH) - botStart);
  lbB.style.bottom = m.cH + 'px';
  lbB.style.height = botH + 'px';
  lbB.style.background = col;

  // pillarbox
  if (m.aL > 0) {
    const sideTop = m.tH + 'px', sideBot = m.cH + 'px';
    lbL.style.cssText = `position:absolute;top:${sideTop};bottom:${sideBot};left:0;width:${m.aL}px;background:${col};z-index:2;pointer-events:none`;
    lbR.style.cssText = `position:absolute;top:${sideTop};bottom:${sideBot};right:0;width:${m.aL}px;background:${col};z-index:2;pointer-events:none`;
  } else {
    lbL.style.width = '0';
    lbR.style.width = '0';
  }
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
async function initCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  imageCapture = null;
  const tries = [
    { facingMode:{ideal:facing}, width:{ideal:65535}, height:{ideal:65535}, frameRate:{ideal:selectedFps,max:selectedFps} },
    { facingMode:{ideal:facing} },
    true
  ];
  for (const c of tries) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:c, audio:false });
      vid.srcObject = stream;
      vid.classList.toggle('mirror', facing === 'user');
      await vid.play();
      checkLens();
      return;
    } catch(e) {}
  }
}

function checkLens() {
  if (!stream) return;
  const track = stream.getVideoTracks()[0];
  if (!track) return;
  // ImageCapture
  try { if (typeof ImageCapture !== 'undefined') imageCapture = new ImageCapture(track); } catch(e) {}
  // Zoom
  try {
    const cap = track.getCapabilities();
    if (cap && cap.zoom && cap.zoom.max > 1.2) {
      zoomCap = cap.zoom; zoomMin = cap.zoom.min || 1; zoomMax = cap.zoom.max || 3;
      buildLensUI();
    }
  } catch(e) {}
}

function buildLensUI() {
  const presets = [{l:'0.5×',z:.5},{l:'1×',z:1},{l:'2×',z:2},{l:'3×',z:3}];
  const avail = presets.filter(p => p.z >= zoomMin*.8 && p.z <= zoomMax*1.1);
  if (avail.length < 2) return;
  lensRow.innerHTML = '';
  lensRow.style.display = 'flex';
  avail.forEach(p => {
    const b = document.createElement('button');
    b.className = 'lpill' + (Math.abs(p.z - zoom) < .01 ? ' on' : '');
    b.textContent = p.l; b.dataset.z = p.z;
    b.onclick = () => setZoom(p.z);
    lensRow.appendChild(b);
  });
  zSl.min = Math.round(zoomMin*10);
  zSl.max = Math.round(zoomMax*10);
  zSl.value = Math.round(zoom*10);
  zoomRow.style.display = 'flex';
}

async function setZoom(z) {
  if (!zoomCap || !stream) return;
  const track = stream.getVideoTracks()[0]; if (!track) return;
  z = Math.max(zoomMin, Math.min(zoomMax, z));
  try { await track.applyConstraints({ advanced:[{zoom:z}] }); } catch(e) {}
  zoom = z;
  zVal.textContent = z.toFixed(1) + '×';
  zSl.value = Math.round(z*10);
  lensRow.querySelectorAll('.lpill').forEach(b => b.classList.toggle('on', Math.abs(parseFloat(b.dataset.z)-z)<.15));
}
zSl.addEventListener('input', () => setZoom(parseInt(zSl.value)/10));

// ── DRAW LOOP ─────────────────────────────────────────────────────────────────
let _ld = 0;
document.addEventListener('visibilitychange', () => { if (!document.hidden) requestAnimationFrame(draw); });

function draw(ts) {
  // Throttle to ~24fps
  if (document.hidden) return;
  if (ts && _ld && (ts - _ld) < 40) { requestAnimationFrame(draw); return; }
  if (ts) _ld = ts;

  const W = window.innerWidth, H = window.innerHeight;
  if (needSz) { cv.width = W; cv.height = H; needSz = false; }
  ctx.clearRect(0, 0, W, H);

  const m = getM();
  const { aL, aT, aW, aH } = m;
  const aR = aL + aW, aB = aT + aH;

  // Update letterbox bars
  updateBars();

  // Vignette
  const vg = ctx.createRadialGradient(aL+aW/2, aT+aH/2, aH*.18, aL+aW/2, aT+aH/2, aH*.76);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.42)');
  ctx.fillStyle = vg; ctx.fillRect(aL, aT, aW, aH);

  // Corner brackets
  const cs = 20, cr = 4;
  ctx.strokeStyle = C; ctx.lineWidth = 2; ctx.setLineDash([]);
  [[aL,aT,1,1],[aR,aT,-1,1],[aL,aB,1,-1],[aR,aB,-1,-1]].forEach(([x,y,dx,dy]) => {
    ctx.beginPath(); ctx.moveTo(x+dx*cs, y); ctx.lineTo(x+dx*cr, y);
    ctx.quadraticCurveTo(x, y, x, y+dy*cr); ctx.lineTo(x, y+dy*cs); ctx.stroke();
  });
  ctx.strokeStyle = CA+'0.1)'; ctx.lineWidth = 0.7;
  ctx.strokeRect(aL+.5, aT+.5, aW-1, aH-1);

  // Center focus bracket
  const fcW = aW*.12, fcH = aH*.14;
  const fcX = aL+aW/2-fcW/2, fcY = aT+aH/2-fcH/2;
  ctx.strokeStyle = CA+'0.65)'; ctx.lineWidth = 1.2;
  [[fcX,fcY,1,1],[fcX+fcW,fcY,-1,1],[fcX,fcY+fcH,1,-1],[fcX+fcW,fcY+fcH,-1,-1]].forEach(([x,y,dx,dy]) => {
    ctx.beginPath(); ctx.moveTo(x+dx*8, y); ctx.lineTo(x+dx*3, y);
    ctx.quadraticCurveTo(x, y, x, y+dy*3); ctx.lineTo(x, y+dy*8); ctx.stroke();
  });
  ctx.fillStyle = CA+'0.5)'; ctx.beginPath(); ctx.arc(aL+aW/2, aT+aH/2, 2, 0, Math.PI*2); ctx.fill();

  // Color space indicator
  ctx.font = '600 8px "Noto Sans",sans-serif'; ctx.textAlign = 'right';
  ctx.fillStyle = capCs.cs === 'display-p3' ? C : 'rgba(255,255,255,.3)';
  ctx.fillText(capCs.label, aR-8, aT+16);

  // Grid
  if (gridOn) {
    ctx.strokeStyle = 'rgba(255,255,255,.16)'; ctx.lineWidth = 0.6; ctx.setLineDash([]);
    for (let i = 1; i <= 2; i++) {
      const x = aL+aW*i/3; ctx.beginPath(); ctx.moveTo(x,aT); ctx.lineTo(x,aB); ctx.stroke();
      const y = aT+aH*i/3; ctx.beginPath(); ctx.moveTo(aL,y); ctx.lineTo(aR,y); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,255,255,.32)';
    for (let i=1;i<=2;i++) for (let j=1;j<=2;j++) {
      ctx.beginPath(); ctx.arc(aL+aW*i/3, aT+aH*j/3, 2, 0, Math.PI*2); ctx.fill();
    }
    const cx = aL+aW/2, cy = aT+aH/2;
    ctx.strokeStyle = CA+'0.6)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); ctx.stroke();
  }

  // Safe areas
  if (safeOn) {
    ctx.setLineDash([4,4]);
    ctx.strokeStyle = CA+'0.38)'; ctx.lineWidth = 0.8;
    const s1=.05; ctx.strokeRect(aL+aW*s1, aT+aH*s1, aW*(1-s1*2), aH*(1-s1*2));
    ctx.strokeStyle = CA+'0.24)';
    const s2=.1;  ctx.strokeRect(aL+aW*s2, aT+aH*s2, aW*(1-s2*2), aH*(1-s2*2));
    ctx.setLineDash([]);
    ctx.font = '300 7px "Noto Sans",sans-serif'; ctx.textAlign = 'left';
    ctx.fillStyle = CA+'0.5)'; ctx.fillText('ACTION SAFE', aL+aW*s1+4, aT+aH*s1+10);
    ctx.fillStyle = CA+'0.35)'; ctx.fillText('TITLE SAFE', aL+aW*s2+4, aT+aH*s2+10);
  }

  ctx.textAlign = 'left';
  requestAnimationFrame(draw);
}

function updateMaskBtn() {

// ── CAPTURE ───────────────────────────────────────────────────────────────────
function getVideoCropRect() {
  const W = window.innerWidth, H = window.innerHeight;
  const vW = vid.videoWidth, vH = vid.videoHeight;
  const m = getM();
  const sc = Math.max(W/vW, H/vH);
  const ox = (W - vW*sc)/2, oy = (H - vH*sc)/2;
  return {
    sx: (m.aL - ox)/sc, sy: (m.aT - oy)/sc,
    sw: m.aW/sc, sh: m.aH/sc
  };
}

function vfFlash() {
  const m = getM();
  const { aL, aT, aW, aH } = m;
  let alpha = 0.85;
  const step = () => {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(aL, aT, aW, aH);
    ctx.restore();
    alpha -= 0.12;
    if (alpha > 0) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function capture() {
  if (!vid.videoWidth) { showToast('NO VIDEO'); return; }
  // Viewfinder-only flash (canvas overlay, no full-screen glare)
  vfFlash();
  const now = new Date();

  // Try ImageCapture (full sensor resolution)
  if (imageCapture) {
    try {
      const blob = await imageCapture.takePhoto();
      const bmp = await createImageBitmap(blob);
      const vc = getVideoCropRect();
      const scX = bmp.width / vid.videoWidth, scY = bmp.height / vid.videoHeight;
      const cX = Math.max(0, Math.round(vc.sx*scX));
      const cY = Math.max(0, Math.round(vc.sy*scY));
      const cW = Math.min(Math.round(vc.sw*scX), bmp.width-cX);
      const cH = Math.min(Math.round(vc.sh*scY), bmp.height-cY);
      const oc = makeCanvas(cW, cH);
      if (facing==='user') { oc.ctx.translate(cW,0); oc.ctx.scale(-1,1); }
      applyLutToCtx(oc.ctx);
      oc.ctx.drawImage(bmp, cX, cY, cW, cH, 0, 0, cW, cH);
      oc.ctx.filter='none';
      bmp.close();
      await saveCanvas(oc.cv, cW, cH, now);
      return;
    } catch(e) {}
  }
  // Fallback: video frame
  vfFlash(); // flash immediately for video frame (instant)
  const vc = getVideoCropRect();
  const oW = Math.round(vc.sw), oH = Math.round(vc.sh);
  const oc = makeCanvas(oW, oH);
  if (facing==='user') { oc.ctx.translate(oW,0); oc.ctx.scale(-1,1); }
  applyLutToCtx(oc.ctx);
  oc.ctx.drawImage(vid, vc.sx, vc.sy, vc.sw, vc.sh, 0, 0, oW, oH);
  oc.ctx.filter='none';
  await saveCanvas(oc.cv, oW, oH, now);
}

function makeCanvas(w, h) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  let c; try { c = cv.getContext('2d', {colorSpace:capCs.cs}); } catch(e) { c = cv.getContext('2d'); }
  return { cv, ctx:c };
}

async function saveCanvas(canvas, w, h, now) {
  const fname = buildFilename(now);
  canvas.toBlob(async raw => {
    if (!raw) return;
    let blob = raw;
    if (capFmt.mime === 'image/jpeg') {
      try { blob = await addExif(raw, {w, h, dt:fmtDate(now)}); } catch(e) {}
    }
    const url = URL.createObjectURL(blob);
    photos.push({ url, blob, fmt:FMTS[fi].l, name:FMTS[fi].n, cs:capCs.label, fname, res:`${w}×${h}`, time:now.getTime() });
    if (photos.length > 50) { URL.revokeObjectURL(photos[0].url); photos.shift(); }
    updateBadge();
    showInstantToast(photos[photos.length-1], `${w}×${h}`);
  }, capFmt.mime, capFmt.mime==='image/jpeg' ? 0.96 : undefined);
}

// ── EXIF ──────────────────────────────────────────────────────────────────────
function fmtDate(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}:${p(d.getMonth()+1)}:${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function L2(v){return[v&255,(v>>8)&255];}
function L4(v){return[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];}
function asc(s){return[...(s||'')].map(c=>c.charCodeAt(0)).concat([0]);}

async function addExif(blob, info) {
  const sw   = [...'Cinemascopome'].map(c=>c.charCodeAt(0)).concat([0]);
  const dt   = [...info.dt].map(c=>c.charCodeAt(0)).concat([0]);
  const IFD0 = 8, N0 = 4;
  const SZ0  = 2 + N0*12 + 4;
  let dp     = IFD0 + SZ0;
  const swOff=dp; dp+=sw.length;
  const dtOff=dp; dp+=dt.length;
  const EXIF =dp;
  const NE   = 4;
  const SZE  = 2 + NE*12 + 4;
  dp+=SZE;
  const dt2Off=dp; dp+=dt.length;

  const b=[];
  b.push(0x49,0x49,0x2A,0x00,...L4(IFD0));
  b.push(...L2(N0));
  for(const [tag,type,cnt,val] of [
    [0x0131,2,sw.length,swOff],
    [0x0132,2,dt.length,dtOff],
    [0x8769,4,1,EXIF],
    [0xA002,4,1,info.w||0],
  ]) b.push(...L2(tag),...L2(type),...L4(cnt),...L4(val));
  b.push(0,0,0,0);
  b.push(...sw,...dt);
  b.push(...L2(NE));
  for(const [tag,type,cnt,val] of [
    [0x9000,7,4,0x30323230],
    [0x9003,2,dt.length,dt2Off],
    [0x9004,2,dt.length,dt2Off],
    [0xA003,4,1,info.h||0],
  ]) b.push(...L2(tag),...L2(type),...L4(cnt),...L4(val));
  b.push(0,0,0,0);
  b.push(...dt);

  const tiff = new Uint8Array(b);
  const marker = [0x45,0x78,0x69,0x66,0,0];
  const segLen = 2 + marker.length + tiff.length;
  const orig = new Uint8Array(await blob.arrayBuffer());
  const out = new Uint8Array(2+2+segLen+orig.length-2);
  let p=0;
  out[p++]=0xFF;out[p++]=0xD8;
  out[p++]=0xFF;out[p++]=0xE1;
  out[p++]=(segLen>>8)&0xFF;out[p++]=segLen&0xFF;
  marker.forEach(v=>out[p++]=v);
  tiff.forEach(v=>out[p++]=v);
  orig.slice(2).forEach(v=>out[p++]=v);
  return new Blob([out],{type:'image/jpeg'});
}

// ── FILENAME ─────────────────────────────────────────────────────────────────
function buildFilename(d=new Date()) {
  const p = n => String(n).padStart(2,'0');
  const date = `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}`;
  const time = `${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
  const lutTag = LUTS[currentLutIdx].id !== 'off' ? '_'+LUTS[currentLutIdx].name.replace(/\s/g,'') : '';
  return `Cinemascopome_${FMTS[fi].n.replace(/\s/g,'_')}_${FMTS[fi].l.replace('.','p')}_${capCs.label}${lutTag}_${date}_${time}.${capFmt.ext}`;
}

  }
  const a = document.createElement('a'); a.href=p.url; a.download=p.fname;

// Pick best supported MIME type
function getBestMime() {
  const candidates = [
    'video/mp4;codecs=avc1.42E01E',
    'video/mp4;codecs=avc1',
    'video/mp4',
    'video/webm;codecs=h264',
    'video/webm;codecs=vp9',
    'video/webm',
  ];
  for (const t of candidates) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

// Recording canvas: draws only the active frame, no HUD
function ensureRecCanvas() {
  if (!recCanvas) {
    recCanvas = document.createElement('canvas');
    recCtx = recCanvas.getContext('2d');
  }
  // Use actual video resolution cropped to selected format ratio
  const vW = vid.videoWidth, vH = vid.videoHeight;
  if (!vW || !vH) return recCanvas;
  const r = FMTS[fi].r;
  let cW, cH;
  if (vW / vH > r) { cH = vH; cW = Math.round(vH * r); }
  else              { cW = vW; cH = Math.round(vW / r); }
  if (recCanvas.width !== cW || recCanvas.height !== cH) {
    recCanvas.width = cW; recCanvas.height = cH;
  }
  return recCanvas;
}

function drawRecFrame() {
  if (!isRecording) return;
  const c = ensureRecCanvas();
  const vW = vid.videoWidth, vH = vid.videoHeight;
  if (!vW || !vH) { requestAnimationFrame(drawRecFrame); return; }
  // Crop video to format ratio in actual video pixel space
  const r = FMTS[fi].r;
  let cX, cY, cW, cH;
  if (vW / vH > r) {
    cH = vH; cW = Math.round(vH * r);
    cX = Math.round((vW - cW) / 2); cY = 0;
  } else {
    cW = vW; cH = Math.round(vW / r);
    cX = 0; cY = Math.round((vH - cH) / 2);
  }
  applyLutToCtx(recCtx);
  recCtx.drawImage(vid, cX, cY, cW, cH, 0, 0, c.width, c.height);
  recCtx.filter = 'none';
  requestAnimationFrame(drawRecFrame);
}

async function startRec() {
  if (!stream) return;
  if (isRecording) { stopRec(); return; }
  const mime = getBestMime();
  if (!mime) { showToast('RECORDING NOT SUPPORTED'); return; }

  ensureRecCanvas();
  const bitrate = codecMode==='hq' ? 50_000_000 : 20_000_000; // 50Mbps HQ / 20Mbps Rec.709

  let recStream;
  try {
    // Capture letterboxed frame from recording canvas
    recStream = recCanvas.captureStream(selectedFps);
  } catch(e) {
    // Fallback: record raw camera stream
    recStream = stream;
  }

  recChunks = [];
  try {
    mediaRecorder = new MediaRecorder(recStream, { mimeType:mime, videoBitsPerSecond:bitrate });
  } catch(e) {
    mediaRecorder = new MediaRecorder(recStream);
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = () => saveRecording();
  mediaRecorder.start(1000); // collect chunks every 1s

  isRecording = true;
  drawRecFrame();

  // UI
  const rb=document.getElementById('rec-btn');
  if(rb)rb.classList.add('recording');
  const rsq=document.getElementById('rec-sq');
  if(rsq)rsq.classList.add('recording');

  document.getElementById('rec-timer').style.display = 'block';
  recSecs = 0;
  updateRecTimer();
  recTimerInterval = setInterval(()=>{recSecs++;updateRecTimer();}, 1000);
}

function stopRec() {
  if (!mediaRecorder || !isRecording) return;
  mediaRecorder.stop();
  isRecording = false;
  clearInterval(recTimerInterval);
  recTimerInterval = null;
  const rb2=document.getElementById('rec-btn');
  if(rb2)rb2.classList.remove('recording');
  const rsq2=document.getElementById('rec-sq');
  if(rsq2)rsq2.classList.remove('recording');

  document.getElementById('rec-timer').style.display = 'none';
}

function updateRecTimer() {
  const m = Math.floor(recSecs/60), s = recSecs%60;
  document.getElementById('rec-time').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function saveRecording() {
  if (!recChunks.length) return;
  const mime = recChunks[0].type || 'video/mp4';
  const ext  = mime.includes('webm') ? 'webm' : 'mp4';
  const blob = new Blob(recChunks, { type:mime });
  const now  = new Date();
  const p = n => String(n).padStart(2,'0');
  const date = `${now.getFullYear()}${p(now.getMonth()+1)}${p(now.getDate())}`;
  const time = `${p(now.getHours())}${p(now.getMinutes())}${p(now.getSeconds())}`;
  const codec = codecMode === 'hq' ? 'HQ' : 'Rec709';
  const lutTag = LUTS[currentLutIdx].id !== 'off' ? '_'+LUTS[currentLutIdx].name.replace(/\s/g,'') : '';
  const fname = `Cinemascopome_${FMTS[fi].n.replace(/\s/g,'_')}_${FMTS[fi].l.replace('.','p')}_${codec}${lutTag}_${date}_${time}.${ext}`;

  const url = URL.createObjectURL(blob);
  // Save video via share or download
  const file = new File([blob], fname, {type:mime});
  if (navigator.canShare && navigator.canShare({files:[file]})) {
    navigator.share({files:[file], title:'Cinemascopome'}).catch(()=>{});
  } else {
    const a = document.createElement('a'); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  showToast('VIDEO SAVED');
  recChunks = [];
}

// ── INIT ─────────────────────────────────────────────────────────────────────
applyFmt();
updateMaskBtn();
buildLutRow();
buildFpsRow();
requestAnimationFrame(draw);
initCam();
</script>
