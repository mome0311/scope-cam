<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCOPE CAM">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>SCOPE CAM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;background:#000;overflow:hidden}

/* ── LANDSCAPE FORCE (portrait端末を90度回転) ── */
#wrap{
width:100vw;height:100vh;
background:#000;position:fixed;top:0;left:0;
overflow:hidden;
}
@media (orientation:portrait){
#wrap{
width:100vh;
height:100vw;
left:calc(50vw - 50vh);
top:calc(50vh - 50vw);
transform:rotate(90deg);
}
}

/* ── VIDEO ── */
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
video.mirror{transform:scaleX(-1)}

/* ── CANVAS ── */
canvas{position:absolute;inset:0;z-index:3;pointer-events:none}

/* ── BARS ── */
.bar{
position:absolute;left:0;width:100%;z-index:10;
background:#0e0e0e;
display:flex;flex-direction:column;overflow:hidden;
}
#bt{top:0;border-bottom:1px solid rgba(232,160,48,.22)}
#bb{bottom:0;border-top:1px solid rgba(232,160,48,.22)}

/* ── TOP HUD ── */
.top-main{
display:flex;align-items:stretch;
border-bottom:1px solid rgba(255,255,255,.06);
min-height:56px;
}
.top-left{
flex:1;padding:10px 16px;
display:flex;flex-direction:column;justify-content:center;
border-right:1px solid rgba(255,255,255,.06);
}
.fmt-label{
font-family:‘Barlow Condensed’,sans-serif;font-weight:200;font-size:8px;
letter-spacing:.24em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:3px;
}
.fmt-name{
font-family:‘Barlow Condensed’,sans-serif;font-weight:700;font-size:20px;line-height:1;
letter-spacing:.12em;color:#e8a030;text-transform:uppercase;
}
.top-center{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:0 16px;gap:4px;
border-right:1px solid rgba(255,255,255,.06);
}
.rec-dot{width:6px;height:6px;border-radius:50%;background:#e03333;animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}
.rec-txt{
font-family:‘Share Tech Mono’,monospace;font-size:8px;
color:rgba(255,255,255,.4);letter-spacing:.14em;
}
.top-right{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:0 14px;gap:2px;min-width:68px;
}
.ratio-num{
font-family:‘Barlow Condensed’,sans-serif;font-weight:600;font-size:22px;line-height:1;
letter-spacing:.04em;color:#e8a030;
}
.ratio-unit{
font-family:‘Barlow Condensed’,sans-serif;font-weight:200;font-size:7px;
letter-spacing:.2em;color:rgba(255,255,255,.3);text-transform:uppercase;
}

/* ── FORMAT PILLS ── */
.pill-row{
display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;
-webkit-overflow-scrolling:touch;
}
.pill-row::-webkit-scrollbar{display:none}
.pill{
flex:1;min-width:56px;position:relative;padding:9px 0;text-align:center;
font-family:‘Barlow Condensed’,sans-serif;font-weight:300;font-size:10px;
letter-spacing:.12em;color:rgba(255,255,255,.22);
background:none;border:none;border-right:1px solid rgba(255,255,255,.06);
cursor:pointer;-webkit-appearance:none;transition:.15s;
}
.pill:last-child{border-right:none}
.pill.on{color:#e8a030;background:rgba(232,160,48,.07)}
.pill.on::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:2px;background:#e8a030}
.pill:active{opacity:.5}

/* ── BOTTOM CONTROLS ── */
.ctrl-top{
display:flex;align-items:stretch;height:44px;
border-bottom:1px solid rgba(255,255,255,.06);
}
.ctrl-seg{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
cursor:pointer;border-right:1px solid rgba(255,255,255,.06);
background:none;border-top:none;border-bottom:none;-webkit-appearance:none;transition:.15s;
}
.ctrl-seg:last-child{border-right:none}
.ctrl-seg.on{background:rgba(232,160,48,.07)}
.ctrl-seg:active{opacity:.4}
.ctrl-icon{font-size:15px;color:rgba(255,255,255,.4);line-height:1;font-family:‘Share Tech Mono’,monospace}
.ctrl-seg.on .ctrl-icon{color:#e8a030}
.ctrl-lbl{
font-family:‘Barlow Condensed’,sans-serif;font-weight:200;font-size:7px;
letter-spacing:.18em;color:rgba(255,255,255,.22);text-transform:uppercase;
}
.ctrl-seg.on .ctrl-lbl{color:#e8a030}
.ctrl-main{
display:flex;align-items:center;justify-content:center;
padding:12px 24px 10px;gap:48px;
}

/* ── SHUTTER ── */
#cap{
width:68px;height:68px;border-radius:50%;
border:none;background:none;cursor:pointer;position:relative;-webkit-appearance:none;
}
.sh-outer{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,.45)}
.sh-mid{position:absolute;inset:5px;border-radius:50%;border:1px solid rgba(255,255,255,.1)}
.sh-inner{position:absolute;inset:10px;border-radius:50%;background:rgba(255,255,255,.85);transition:.1s}
#cap:active .sh-outer{border-color:#e8a030}
#cap:active .sh-inner{background:rgba(255,255,255,.2);transform:scale(.85)}
.cap-lbl{
font-family:‘Barlow Condensed’,sans-serif;font-weight:200;font-size:7px;
letter-spacing:.22em;color:rgba(255,255,255,.2);text-align:center;margin-top:4px;
}

/* ── FOCUS RING ── */
#focus{
position:absolute;width:52px;height:52px;margin:-26px 0 0 -26px;
z-index:6;pointer-events:none;opacity:0;transition:opacity .4s;
}
.fc{position:absolute;width:10px;height:10px;border-color:#e8a030;border-style:solid}
.fc.tl{top:0;left:0;border-width:1.5px 0 0 1.5px}
.fc.tr{top:0;right:0;border-width:1.5px 1.5px 0 0}
.fc.bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.fc.br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}

/* ── STREAK ── */
#streak{
position:absolute;left:0;width:100%;height:1px;z-index:4;pointer-events:none;
background:linear-gradient(to right,transparent,rgba(150,210,255,.3) 30%,rgba(200,230,255,.55) 50%,rgba(150,210,255,.3) 70%,transparent);
opacity:0;
}
/* ── FLASH ── */
#flash{position:absolute;inset:0;background:#fff;z-index:99;opacity:0;pointer-events:none}
/* ── TOAST ── */
#toast{
position:absolute;bottom:110px;left:50%;transform:translateX(-50%);
background:rgba(14,14,14,.92);color:#e8a030;
font-family:‘Barlow Condensed’,sans-serif;font-weight:300;font-size:9px;
letter-spacing:.2em;padding:7px 18px;z-index:90;opacity:0;
white-space:nowrap;border:1px solid rgba(232,160,48,.25);transition:opacity .2s;
}
</style>

</head>
<body>
<div id="wrap">
  <video id="vid" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="cv"></canvas>
  <div id="streak"></div>

  <!-- TOP BAR -->

  <div id="bt" class="bar">
    <div class="top-main">
      <div class="top-left">
        <div class="fmt-label">Format</div>
        <div class="fmt-name" id="fn">CINEMASCOPE</div>
      </div>
      <div class="top-center">
        <div class="rec-dot"></div>
        <div class="rec-txt">LIVE</div>
      </div>
      <div class="top-right">
        <div class="ratio-num" id="rl">2.39</div>
        <div class="ratio-unit">Aspect Ratio</div>
      </div>
    </div>
    <div class="pill-row" id="pills"></div>
  </div>

  <!-- BOTTOM BAR -->

  <div id="bb" class="bar">
    <div class="ctrl-top">
      <button class="ctrl-seg" id="gridBtn">
        <div class="ctrl-icon">⊞</div><div class="ctrl-lbl">Grid</div>
      </button>
      <button class="ctrl-seg" id="safeBtn">
        <div class="ctrl-icon">▣</div><div class="ctrl-lbl">Safe</div>
      </button>
      <button class="ctrl-seg" id="flareBtn">
        <div class="ctrl-icon">≋</div><div class="ctrl-lbl">Flare</div>
      </button>
      <button class="ctrl-seg" id="flipBtn">
        <div class="ctrl-icon">↻</div><div class="ctrl-lbl">Flip</div>
      </button>
    </div>
    <div class="ctrl-main">
      <div style="width:44px"></div>
      <div style="display:flex;flex-direction:column;align-items:center">
        <button id="cap">
          <div class="sh-outer"></div>
          <div class="sh-mid"></div>
          <div class="sh-inner"></div>
        </button>
        <div class="cap-lbl">CAPTURE</div>
      </div>
      <div style="width:44px"></div>
    </div>
  </div>

  <div id="flash"></div>
  <div id="toast"></div>
  <div id="focus">
    <div class="fc tl"></div><div class="fc tr"></div>
    <div class="fc bl"></div><div class="fc br"></div>
  </div>

  <!-- START SCREEN -->

  <div id="ss" style="position:absolute;inset:0;z-index:80;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div style="flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);padding:32px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:200;font-size:10px;letter-spacing:.28em;color:rgba(255,255,255,.4)">CINEMASCOPE CAMERA</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:64px;line-height:1;letter-spacing:.08em;color:#e8a030">SCOPE</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.28)">FOR FILM &amp; VFX PRODUCTION</div>
    </div>
    <div style="width:100%;padding:28px 32px;display:flex;flex-direction:column;align-items:center;gap:18px">
      <button id="ss-btn" style="width:100%;max-width:300px;padding:16px;border:1px solid rgba(232,160,48,.35);background:none;color:#e8a030;font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:12px;letter-spacing:.22em;cursor:pointer;-webkit-appearance:none">
        &#9654; &nbsp;START CAMERA
      </button>
      <div style="display:flex;gap:28px;align-items:center">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;color:rgba(255,255,255,.5)">5</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:200;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.22)">FORMATS</div>
        </div>
        <div style="width:1px;height:28px;background:rgba(255,255,255,.08)"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;color:rgba(255,255,255,.5)">4K</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:200;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.22)">CAPTURE</div>
        </div>
        <div style="width:1px;height:28px;background:rgba(255,255,255,.08)"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;color:rgba(255,255,255,.5)">2.39</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:200;font-size:7px;letter-spacing:.2em;color:rgba(255,255,255,.22)">DEFAULT</div>
        </div>
      </div>
      <div id="ss-err" style="font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:9px;color:rgba(255,80,80,.7);letter-spacing:.12em;text-align:center;display:none;line-height:2"></div>
    </div>
  </div>
</div>

<script>
const FMTS=[
  {r:1.33,l:'1.33',n:'ACADEMY'},
  {r:1.78,l:'1.78',n:'HDTV 16:9'},
  {r:1.85,l:'1.85',n:'FLAT'},
  {r:2.39,l:'2.39',n:'CINEMASCOPE'},
  {r:2.76,l:'2.76',n:'ULTRA 70'},
];
const MIN_BAR=120;
let fi=3,facing='environment',stream=null;
let gridOn=false,safeOn=false,flareOn=false;
let needSz=true,ftmr=null,ttmr=null;

const wrap=document.getElementById('wrap');
const vid=document.getElementById('vid');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const bt=document.getElementById('bt');
const bb=document.getElementById('bb');
const fn=document.getElementById('fn');
const rl=document.getElementById('rl');
const gridBtn=document.getElementById('gridBtn');
const safeBtn=document.getElementById('safeBtn');
const flareBtn=document.getElementById('flareBtn');
const flipBtn=document.getElementById('flipBtn');
const capBtn=document.getElementById('cap');
const flash=document.getElementById('flash');
const toast=document.getElementById('toast');
const focus=document.getElementById('focus');
const streak=document.getElementById('streak');
const ss=document.getElementById('ss');
const ssBtn=document.getElementById('ss-btn');
const ssErr=document.getElementById('ss-err');
const pillBox=document.getElementById('pills');

// Build format pills
FMTS.forEach((f,i)=>{
  const b=document.createElement('button');
  b.className='pill'+(i===fi?' on':'');
  b.textContent=f.l;
  b.onclick=()=>{fi=i;applyFmt();updateBars()};
  pillBox.appendChild(b);
});

function applyFmt(){
  const f=FMTS[fi];
  fn.textContent=f.n;
  rl.textContent=f.l;
  pillBox.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===fi));
}

// Wrap dimensions (may be rotated)
function wrapW(){ return wrap.offsetWidth; }
function wrapH(){ return wrap.offsetHeight; }

function getM(){
  const W=wrapW(), H=wrapH();
  const r=FMTS[fi].r;
  const ah=W/r;
  if(ah<=H){
    const bh=(H-ah)/2;
    return{W,H,aW:W,aH:ah,bH:bh,aT:bh,aL:0,mode:'LB'};
  } else {
    const aw=H*r,bw=(W-aw)/2;
    return{W,H,aW:aw,aH:H,bH:0,aT:0,aL:bw,mode:'PB'};
  }
}

function updateBars(){
  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  bt.style.height=bh+'px';
  bb.style.height=bh+'px';
}

async function initCam(){
  ssBtn.textContent='STARTING…';
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const tries=[
    {facingMode:{ideal:facing},width:{ideal:3840},height:{ideal:2160}},
    {facingMode:{ideal:facing}},
    true
  ];
  for(const c of tries){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:c,audio:false});
      vid.srcObject=stream;
      vid.classList.toggle('mirror',facing==='user');
      await vid.play();
      ss.style.display='none';
      return;
    }catch{}
  }
  ssBtn.textContent='▶ RETRY';
  ssBtn.onclick=initCam;
  ssErr.style.display='block';
  ssErr.innerHTML='CAMERA ACCESS FAILED<br>ALLOW CAMERA IN SAFARI SETTINGS';
}

function draw(){
  const W=wrapW(), H=wrapH();
  if(needSz){cv.width=W;cv.height=H;needSz=false;}
  ctx.clearRect(0,0,cv.width,cv.height);

  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  const aT=bh,aH=H-2*bh,aL=m.aL,aW=m.aW;

  // Extra overlay if min-bar extends into frame
  if(bh>m.bH&&m.bH>=0){
    const ex=bh-m.bH;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillRect(aL,aT,aW,ex);
    ctx.fillRect(aL,aT+aH-ex,aW,ex);
  }
  if(m.mode==='PB'){
    ctx.fillStyle='#0e0e0e';
    ctx.fillRect(0,0,aL,H);
    ctx.fillRect(aL+aW,0,W-(aL+aW),H);
  }

  // Frame border
  ctx.strokeStyle='rgba(232,160,48,0.18)';ctx.lineWidth=0.8;
  ctx.strokeRect(aL+0.5,aT+0.5,aW-1,aH-1);

  // Corner brackets
  const cs=16;
  ctx.strokeStyle='rgba(232,160,48,0.5)';ctx.lineWidth=1.5;
  [[aL,aT,1,1],[aL+aW,aT,-1,1],[aL,aT+aH,1,-1],[aL+aW,aT+aH,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(x+dx*cs,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*cs);ctx.stroke();
  });

  // Grid
  if(gridOn){
    ctx.strokeStyle='rgba(255,255,255,0.14)';ctx.lineWidth=0.5;
    for(let i=1;i<=2;i++){
      const x=aL+aW*i/3;ctx.beginPath();ctx.moveTo(x,aT);ctx.lineTo(x,aT+aH);ctx.stroke();
      const y=aT+aH*i/3;ctx.beginPath();ctx.moveTo(aL,y);ctx.lineTo(aL+aW,y);ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.3)';
    for(let i=1;i<=2;i++)for(let j=1;j<=2;j++){
      ctx.beginPath();ctx.arc(aL+aW*i/3,aT+aH*j/3,2,0,Math.PI*2);ctx.fill();
    }
    const cx2=aL+aW/2,cy2=aT+aH/2;
    ctx.strokeStyle='rgba(232,160,48,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx2-12,cy2);ctx.lineTo(cx2+12,cy2);ctx.moveTo(cx2,cy2-12);ctx.lineTo(cx2,cy2+12);ctx.stroke();
    ctx.strokeStyle='rgba(232,160,48,0.22)';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.arc(cx2,cy2,4,0,Math.PI*2);ctx.stroke();
  }

  // Safe areas
  if(safeOn){
    ctx.setLineDash([4,4]);
    ctx.strokeStyle='rgba(255,200,60,0.35)';ctx.lineWidth=0.7;
    const s1=0.05;ctx.strokeRect(aL+aW*s1,aT+aH*s1,aW*(1-s1*2),aH*(1-s1*2));
    ctx.strokeStyle='rgba(255,110,40,0.35)';
    const s2=0.1;ctx.strokeRect(aL+aW*s2,aT+aH*s2,aW*(1-s2*2),aH*(1-s2*2));
    ctx.setLineDash([]);
    ctx.font='7px "Barlow Condensed"';
    ctx.fillStyle='rgba(255,200,60,0.45)';ctx.fillText('ACTION SAFE',aL+aW*s1+3,aT+aH*s1+10);
    ctx.fillStyle='rgba(255,110,40,0.45)';ctx.fillText('TITLE SAFE',aL+aW*s2+3,aT+aH*s2+10);
  }
  requestAnimationFrame(draw);
}

function updateStreak(){
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  streak.style.top=(bh+(wrapH()-2*bh)/2)+'px';
  streak.style.opacity=flareOn?'1':'0';
}

// Map screen click coords → wrap-local coords (handles portrait rotation)
function toWrapCoords(sx,sy){
  const isPortrait=window.innerWidth<window.innerHeight;
  if(isPortrait){
    // wrap is rotated 90deg CW: screen→wrap mapping
    // From our rotation math: wrap(x,y) ← screen(y, wrapW()-x) ... approximate
    const sw=window.innerWidth,sh=window.innerHeight;
    return{x:sy*(wrapW()/sh), y:(sw-sx)*(wrapH()/sw)};
  }
  return{x:sx,y:sy};
}

function capture(){
  const vW=vid.videoWidth,vH=vid.videoHeight;
  if(!vW||!vH){showToast('NO VIDEO');return;}
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  const W=wrapW(),H=wrapH();
  const aT=bh,aH=H-2*bh,aL=m.aL,aW=m.aW;
  const sc=Math.max(W/vW,H/vH);
  const ox=(W-vW*sc)/2,oy=(H-vH*sc)/2;
  const sx=(aL-ox)/sc,sy=(aT-oy)/sc,sw=aW/sc,sh=aH/sc;
  const out=document.createElement('canvas');
  out.width=Math.round(Math.abs(sw));out.height=Math.round(Math.abs(sh));
  const oc=out.getContext('2d');
  if(facing==='user'){oc.translate(out.width,0);oc.scale(-1,1);}
  oc.drawImage(vid,sx,sy,sw,sh,0,0,out.width,out.height);
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{flash.style.transition='opacity .12s';flash.style.opacity='0';},80);
  out.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='SCOPE_'+FMTS[fi].l.replace('.','p')+'_'+Date.now()+'.jpg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast('IMAGE SAVED');
  },'image/jpeg',0.94);
}

function showToast(msg){
  toast.textContent=msg;toast.style.opacity='1';
  clearTimeout(ttmr);ttmr=setTimeout(()=>toast.style.opacity='0',2000);
}

ssBtn.onclick=initCam;
gridBtn.onclick=()=>{gridOn=!gridOn;gridBtn.classList.toggle('on',gridOn)};
safeBtn.onclick=()=>{safeOn=!safeOn;safeBtn.classList.toggle('on',safeOn)};
flareBtn.onclick=()=>{flareOn=!flareOn;flareBtn.classList.toggle('on',flareOn);updateStreak()};
flipBtn.onclick=()=>{facing=facing==='environment'?'user':'environment';if(stream)initCam()};
capBtn.onclick=capture;

wrap.addEventListener('click',e=>{
  if(e.target.closest('button'))return;
  const {x,y}=toWrapCoords(e.clientX,e.clientY);
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  if(x>=m.aL&&x<=m.aL+m.aW&&y>=bh&&y<=wrapH()-bh){
    focus.style.left=x+'px';focus.style.top=y+'px';focus.style.opacity='1';
    clearTimeout(ftmr);ftmr=setTimeout(()=>focus.style.opacity='0',1400);
  }
});

const onResize=()=>{needSz=true;setTimeout(()=>{updateBars();updateStreak();},100)};
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>setTimeout(onResize,400));

applyFmt();updateBars();draw();
</script>
