<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCOPE CAM">
<meta name="theme-color" content="#0d0d0d">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>SCOPE CAM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --amber:#e8a030;
  --amber-dim:rgba(232,160,48,.08);
  --amber-mid:rgba(232,160,48,.18);
  --amber-line:rgba(232,160,48,.28);
  --red:#e03333;
  --bar:#0e0e0e;
  --line:rgba(255,255,255,.06);
  --dim:rgba(255,255,255,.32);
  --mono:'Share Tech Mono',monospace;
  --cond:'Barlow Condensed',sans-serif;
  --sft:env(safe-area-inset-top,0px);
  --sfb:env(safe-area-inset-bottom,0px);
}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#wrap{width:100%;height:100vh;background:#000;position:relative;overflow:hidden}

/* VIDEO */
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
video.mirror{transform:scaleX(-1)}

/* CANVAS */
canvas{position:absolute;inset:0;z-index:3;pointer-events:none}

/* BARS */
.bar{
position:absolute;left:0;width:100%;z-index:10;
background:var(–bar);
display:flex;flex-direction:column;
overflow:hidden;
}
.bar::before{
content:’’;position:absolute;left:0;right:0;
height:1px;background:var(–amber-line);opacity:.4;
z-index:1;
}
#bt{top:0;padding-top:var(–sft)}
#bt::before{bottom:0;top:auto}
#bb{bottom:0;padding-bottom:var(–sfb)}
#bb::before{top:0;bottom:auto}

/* ── TOP HUD ── */
.top-main{
display:flex;align-items:stretch;
padding:0;border-bottom:1px solid var(–line);
min-height:62px;
}
.top-left{
flex:1;padding:12px 16px;
display:flex;flex-direction:column;justify-content:center;
border-right:1px solid var(–line);
}
.fmt-label{
font:200 9px/1 var(–cond);
letter-spacing:.22em;color:var(–dim);
text-transform:uppercase;margin-bottom:4px;
}
.fmt-name{
font:700 22px/1 var(–cond);
letter-spacing:.12em;color:var(–amber);
text-transform:uppercase;
}
.top-center{
display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:0 18px;gap:5px;
border-right:1px solid var(–line);
}
.rec-dot{width:6px;height:6px;border-radius:50%;background:var(–red);animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}
.rec-txt{font:9px var(–mono);color:var(–dim);letter-spacing:.14em}
.top-right{
display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:0 16px;gap:3px;min-width:72px;
}
.ratio-num{font:600 20px/1 var(–cond);color:var(–amber);letter-spacing:.04em}
.ratio-unit{font:200 9px/1 var(–cond);letter-spacing:.2em;color:var(–dim)}

/* FORMAT PILLS */
.pill-row{
display:flex;align-items:center;
padding:0;overflow-x:auto;scrollbar-width:none;
-webkit-overflow-scrolling:touch;
border-bottom:none;
}
.pill-row::-webkit-scrollbar{display:none}
.pill{
flex-shrink:0;position:relative;
padding:10px 0;flex:1;min-width:60px;
text-align:center;
font:300 10px/1 var(–cond);letter-spacing:.12em;
color:rgba(255,255,255,.25);
background:none;border:none;cursor:pointer;
-webkit-appearance:none;transition:.2s;
border-right:1px solid var(–line);
}
.pill:last-child{border-right:none}
.pill.on{color:var(–amber);background:var(–amber-dim)}
.pill.on::after{
content:’’;position:absolute;bottom:0;left:0;right:0;
height:2px;background:var(–amber);
}
.pill:active{opacity:.5}

/* ── BOTTOM CONTROLS ── */
.ctrl-top{
display:flex;align-items:stretch;
border-bottom:1px solid var(–line);
height:48px;
}
.ctrl-seg{
flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;
gap:2px;cursor:pointer;
border-right:1px solid var(–line);
background:none;border-top:none;border-bottom:none;
-webkit-appearance:none;transition:.15s;
}
.ctrl-seg:last-child{border-right:none}
.ctrl-seg.on{background:var(–amber-dim)}
.ctrl-seg:active{opacity:.4}
.ctrl-icon{font:16px var(–mono);color:rgba(255,255,255,.5);line-height:1}
.ctrl-seg.on .ctrl-icon{color:var(–amber)}
.ctrl-lbl{font:200 7px/1 var(–cond);letter-spacing:.18em;color:rgba(255,255,255,.25)}
.ctrl-seg.on .ctrl-lbl{color:var(–amber)}

.ctrl-main{
display:flex;align-items:center;justify-content:space-between;
padding:16px 24px 14px;
}
.side-group{display:flex;gap:10px;align-items:center}
.hw-btn{
width:46px;height:46px;border-radius:50%;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.04);
color:rgba(255,255,255,.6);
font-family:var(–mono);font-size:17px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
-webkit-appearance:none;transition:.15s;
position:relative;
}
.hw-btn::after{
content:’’;position:absolute;inset:3px;
border-radius:50%;
border:1px solid rgba(255,255,255,.06);
}
.hw-btn.on{border-color:var(–amber-line);color:var(–amber);background:var(–amber-dim)}
.hw-btn:active{opacity:.4;transform:scale(.92)}
.hw-lbl{font:200 7px/1 var(–cond);letter-spacing:.18em;color:rgba(255,255,255,.22);text-align:center;margin-top:4px}
.hw-wrap{display:flex;flex-direction:column;align-items:center}

/* SHUTTER BUTTON */
.shutter-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
#cap{
width:72px;height:72px;border-radius:50%;
border:none;background:none;cursor:pointer;
position:relative;-webkit-appearance:none;
}
.shutter-outer{
position:absolute;inset:0;border-radius:50%;
border:2px solid rgba(255,255,255,.5);
}
.shutter-mid{
position:absolute;inset:5px;border-radius:50%;
border:1px solid rgba(255,255,255,.12);
}
.shutter-inner{
position:absolute;inset:10px;border-radius:50%;
background:rgba(255,255,255,.88);
transition:.1s;
}
#cap:active .shutter-outer{border-color:var(–amber)}
#cap:active .shutter-inner{background:rgba(255,255,255,.25);transform:scale(.88)}
.shutter-lbl{font:200 7px/1 var(–cond);letter-spacing:.22em;color:rgba(255,255,255,.22)}

/* FOCUS RING */
#focus{position:absolute;width:54px;height:54px;margin:-27px 0 0 -27px;z-index:6;pointer-events:none;opacity:0;transition:opacity .4s}
.fc{position:absolute;width:10px;height:10px;border-color:var(–amber);border-style:solid}
.fc.tl{top:0;left:0;border-width:1.5px 0 0 1.5px}
.fc.tr{top:0;right:0;border-width:1.5px 1.5px 0 0}
.fc.bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.fc.br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}

/* STREAK */
#streak{position:absolute;left:0;width:100%;height:1px;z-index:4;pointer-events:none;background:linear-gradient(to right,transparent,rgba(150,210,255,.3) 30%,rgba(200,230,255,.55) 50%,rgba(150,210,255,.3) 70%,transparent);opacity:0}

/* FLASH */
#flash{position:absolute;inset:0;background:#fff;z-index:99;opacity:0;pointer-events:none}

/* TOAST */
#toast{
position:absolute;bottom:140px;left:50%;transform:translateX(-50%);
background:rgba(14,14,14,.9);color:var(–amber);
font:300 9px/1 var(–cond);letter-spacing:.18em;
padding:8px 18px;z-index:90;opacity:0;white-space:nowrap;
border:1px solid var(–amber-mid);transition:opacity .2s;
}

/* START SCREEN */
#ss{position:absolute;inset:0;z-index:80;background:#0d0d0d;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
.ss-top{
width:100%;flex:1;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
border-bottom:1px solid var(–line);
}
.ss-model{font:200 11px/1 var(–cond);letter-spacing:.28em;color:var(–dim)}
.ss-name{font:700 48px/1 var(–cond);letter-spacing:.06em;color:var(–amber)}
.ss-sub{font:300 10px/1 var(–cond);letter-spacing:.2em;color:rgba(255,255,255,.2);margin-top:4px}
.ss-bottom{
width:100%;padding:32px 24px;
display:flex;flex-direction:column;align-items:center;gap:16px;
}
#ss-btn{
width:100%;max-width:280px;padding:16px;
border:1px solid var(–amber-line);background:none;
color:var(–amber);font:400 11px/1 var(–cond);letter-spacing:.22em;
cursor:pointer;-webkit-appearance:none;transition:.15s;
display:flex;align-items:center;justify-content:center;gap:10px;
}
#ss-btn:active{background:var(–amber-dim)}
.ss-specs{
display:flex;gap:24px;align-items:center;
}
.ss-spec{display:flex;flex-direction:column;align-items:center;gap:3px}
.ss-spec-val{font:600 14px/1 var(–cond);letter-spacing:.06em;color:rgba(255,255,255,.5)}
.ss-spec-lbl{font:200 7px/1 var(–cond);letter-spacing:.2em;color:rgba(255,255,255,.2)}
.ss-divider{width:1px;height:28px;background:var(–line)}
#ss-err{font:300 8px/1.8 var(–cond);color:rgba(255,80,80,.6);letter-spacing:.14em;text-align:center;display:none}
</style>

</head>
<body>
<div id="wrap">
  <video id="vid" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="cv"></canvas>
  <div id="streak"></div>

  <!-- TOP BAR -->

  <div id="bt" class="bar">
    <div class="top-main">
      <div class="top-left">
        <div class="fmt-label">Format</div>
        <div class="fmt-name" id="fn">CINEMASCOPE</div>
      </div>
      <div class="top-center">
        <div class="rec-dot"></div>
        <div class="rec-txt">LIVE</div>
      </div>
      <div class="top-right">
        <div class="ratio-num" id="rl">2.39</div>
        <div class="ratio-unit">ASPECT RATIO</div>
      </div>
    </div>
    <div class="pill-row" id="pills"></div>
  </div>

  <!-- BOTTOM BAR -->

  <div id="bb" class="bar">
    <div class="ctrl-top">
      <button class="ctrl-seg" id="gridBtn">
        <div class="ctrl-icon">⊞</div>
        <div class="ctrl-lbl">GRID</div>
      </button>
      <button class="ctrl-seg" id="safeBtn">
        <div class="ctrl-icon">▣</div>
        <div class="ctrl-lbl">SAFE</div>
      </button>
      <button class="ctrl-seg" id="flareBtn">
        <div class="ctrl-icon">≋</div>
        <div class="ctrl-lbl">FLARE</div>
      </button>
      <button class="ctrl-seg" id="flipBtn">
        <div class="ctrl-icon">↻</div>
        <div class="ctrl-lbl">FLIP</div>
      </button>
    </div>
    <div class="ctrl-main">
      <div style="width:80px"></div>
      <div class="shutter-wrap">
        <button id="cap">
          <div class="shutter-outer"></div>
          <div class="shutter-mid"></div>
          <div class="shutter-inner"></div>
        </button>
        <div class="shutter-lbl">CAPTURE</div>
      </div>
      <div style="width:80px"></div>
    </div>
  </div>

  <div id="flash"></div>
  <div id="toast"></div>
  <div id="focus">
    <div class="fc tl"></div><div class="fc tr"></div>
    <div class="fc bl"></div><div class="fc br"></div>
  </div>

  <!-- START SCREEN -->

  <div id="ss">
    <div class="ss-top">
      <div class="ss-model">CINEMASCOPE CAMERA</div>
      <div class="ss-name">SCOPE</div>
      <div class="ss-sub">FOR FILM &amp; VFX PRODUCTION</div>
    </div>
    <div class="ss-bottom">
      <button id="ss-btn">
        <span style="font-size:10px;opacity:.6">▶</span>
        START CAMERA
      </button>
      <div class="ss-specs">
        <div class="ss-spec">
          <div class="ss-spec-val">5</div>
          <div class="ss-spec-lbl">FORMATS</div>
        </div>
        <div class="ss-divider"></div>
        <div class="ss-spec">
          <div class="ss-spec-val">4K</div>
          <div class="ss-spec-lbl">CAPTURE</div>
        </div>
        <div class="ss-divider"></div>
        <div class="ss-spec">
          <div class="ss-spec-val">2.39</div>
          <div class="ss-spec-lbl">DEFAULT</div>
        </div>
      </div>
      <div id="ss-err"></div>
    </div>
  </div>
</div>

<script>
const FMTS=[
  {r:1.33,l:'1.33',n:'ACADEMY',   nt:'4:3'},
  {r:1.78,l:'1.78',n:'HDTV',      nt:'16:9'},
  {r:1.85,l:'1.85',n:'FLAT',      nt:'1.85'},
  {r:2.39,l:'2.39',n:'CINEMASCOPE',nt:'2.39'},
  {r:2.76,l:'2.76',n:'ULTRA 70',  nt:'2.76'},
];
const MIN_BAR=130;
let fi=3,facing='environment',stream=null;
let gridOn=false,safeOn=false,flareOn=false;
let needSz=true,ftmr=null,ttmr=null;

const wrap=document.getElementById('wrap');
const vid=document.getElementById('vid');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const bt=document.getElementById('bt');
const bb=document.getElementById('bb');
const fn=document.getElementById('fn');
const rl=document.getElementById('rl');
const gridBtn=document.getElementById('gridBtn');
const safeBtn=document.getElementById('safeBtn');
const flareBtn=document.getElementById('flareBtn');
const flipBtn=document.getElementById('flipBtn');
const capBtn=document.getElementById('cap');
const flash=document.getElementById('flash');
const toast=document.getElementById('toast');
const focus=document.getElementById('focus');
const streak=document.getElementById('streak');
const ss=document.getElementById('ss');
const ssBtn=document.getElementById('ss-btn');
const ssErr=document.getElementById('ss-err');
const pillBox=document.getElementById('pills');

FMTS.forEach((f,i)=>{
  const b=document.createElement('button');
  b.className='pill'+(i===fi?' on':'');
  b.textContent=f.l;
  b.onclick=()=>{fi=i;applyFmt();updateBars();};
  pillBox.appendChild(b);
});

function applyFmt(){
  const f=FMTS[fi];
  fn.textContent=f.n;
  rl.textContent=f.l;
  pillBox.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===fi));
}

function getM(){
  const W=wrap.offsetWidth||window.innerWidth;
  const H=wrap.offsetHeight||window.innerHeight;
  const r=FMTS[fi].r;
  const ah=W/r;
  if(ah<=H){const bh=(H-ah)/2;return{W,H,aW:W,aH:ah,bH:bh,aT:bh,aL:0,mode:'LB'};}
  else{const aw=H*r,bw=(W-aw)/2;return{W,H,aW:aw,aH:H,bH:0,aT:0,aL:bw,mode:'PB'};}
}

function updateBars(){
  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  bt.style.height=bh+'px';
  bb.style.height=bh+'px';
}

async function initCam(){
  ssBtn.querySelector('span').textContent='';
  ssBtn.childNodes[ssBtn.childNodes.length-1].textContent=' STARTING…';
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const tries=[
    {facingMode:{ideal:facing},width:{ideal:3840},height:{ideal:2160}},
    {facingMode:{ideal:facing}},
    true
  ];
  for(const c of tries){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:c,audio:false});
      vid.srcObject=stream;
      vid.classList.toggle('mirror',facing==='user');
      await vid.play();
      ss.style.display='none';
      return;
    }catch{}
  }
  ssBtn.innerHTML='<span style="font-size:10px;opacity:.6">▶</span> RETRY';
  ssBtn.onclick=initCam;
  ssErr.style.display='block';
  ssErr.innerHTML='CAMERA ACCESS FAILED<br>ALLOW CAMERA IN SAFARI SETTINGS';
}

function draw(){
  if(needSz){cv.width=wrap.offsetWidth||window.innerWidth;cv.height=wrap.offsetHeight||window.innerHeight;needSz=false;}
  ctx.clearRect(0,0,cv.width,cv.height);
  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  const aT=bh,aH=m.H-2*bh,aL=m.aL,aW=m.aW;

  if(bh>m.bH&&m.bH>=0){
    const ex=bh-m.bH;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(aL,aT,aW,ex);
    ctx.fillRect(aL,aT+aH-ex,aW,ex);
  }
  if(m.mode==='PB'){
    ctx.fillStyle='#0e0e0e';
    ctx.fillRect(0,0,aL,m.H);
    ctx.fillRect(aL+aW,0,m.W-(aL+aW),m.H);
  }

  // Frame border - amber
  ctx.strokeStyle='rgba(232,160,48,0.22)';
  ctx.lineWidth=1;
  ctx.strokeRect(aL+0.5,aT+0.5,aW-1,aH-1);

  // Corner brackets
  const cs=18;
  ctx.strokeStyle='rgba(232,160,48,0.55)';
  ctx.lineWidth=1.5;
  [[aL,aT,1,1],[aL+aW,aT,-1,1],[aL,aT+aH,1,-1],[aL+aW,aT+aH,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();
    ctx.moveTo(x+dx*cs,y);ctx.lineTo(x,y);ctx.lineTo(x,y+dy*cs);
    ctx.stroke();
  });

  if(gridOn){
    ctx.strokeStyle='rgba(255,255,255,0.14)';ctx.lineWidth=0.5;
    for(let i=1;i<=2;i++){
      const x=aL+aW*i/3;ctx.beginPath();ctx.moveTo(x,aT);ctx.lineTo(x,aT+aH);ctx.stroke();
      const y=aT+aH*i/3;ctx.beginPath();ctx.moveTo(aL,y);ctx.lineTo(aL+aW,y);ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.32)';
    for(let i=1;i<=2;i++)for(let j=1;j<=2;j++){ctx.beginPath();ctx.arc(aL+aW*i/3,aT+aH*j/3,2,0,Math.PI*2);ctx.fill();}
    const cx2=aL+aW/2,cy2=aT+aH/2;
    ctx.strokeStyle='rgba(232,160,48,0.6)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx2-12,cy2);ctx.lineTo(cx2+12,cy2);ctx.moveTo(cx2,cy2-12);ctx.lineTo(cx2,cy2+12);ctx.stroke();
    ctx.strokeStyle='rgba(232,160,48,0.22)';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.arc(cx2,cy2,4.5,0,Math.PI*2);ctx.stroke();
  }

  if(safeOn){
    ctx.setLineDash([4,4]);
    ctx.strokeStyle='rgba(255,200,60,0.35)';ctx.lineWidth=0.7;
    const s1=0.05;ctx.strokeRect(aL+aW*s1,aT+aH*s1,aW*(1-s1*2),aH*(1-s1*2));
    ctx.strokeStyle='rgba(255,110,40,0.35)';
    const s2=0.1;ctx.strokeRect(aL+aW*s2,aT+aH*s2,aW*(1-s2*2),aH*(1-s2*2));
    ctx.setLineDash([]);
    ctx.font='7px "Barlow Condensed"';ctx.letterSpacing='0.1em';
    ctx.fillStyle='rgba(255,200,60,0.45)';ctx.fillText('ACTION SAFE',aL+aW*s1+4,aT+aH*s1+11);
    ctx.fillStyle='rgba(255,110,40,0.45)';ctx.fillText('TITLE SAFE',aL+aW*s2+4,aT+aH*s2+11);
  }
  requestAnimationFrame(draw);
}

function updateStreak(){
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  streak.style.top=(bh+(m.H-2*bh)/2)+'px';
  streak.style.opacity=flareOn?'1':'0';
}

function capture(){
  const vW=vid.videoWidth,vH=vid.videoHeight;
  if(!vW||!vH){showToast('NO VIDEO');return;}
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  const aT=bh,aH=m.H-2*bh,aL=m.aL,aW=m.aW;
  const sc=Math.max(m.W/vW,m.H/vH);
  const ox=(m.W-vW*sc)/2,oy=(m.H-vH*sc)/2;
  const sx=(aL-ox)/sc,sy=(aT-oy)/sc,sw=aW/sc,sh=aH/sc;
  const out=document.createElement('canvas');
  out.width=Math.round(Math.abs(sw));out.height=Math.round(Math.abs(sh));
  const oc=out.getContext('2d');
  if(facing==='user'){oc.translate(out.width,0);oc.scale(-1,1);}
  oc.drawImage(vid,sx,sy,sw,sh,0,0,out.width,out.height);
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{flash.style.transition='opacity .12s';flash.style.opacity='0';},80);
  out.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='SCOPE_'+FMTS[fi].l.replace('.','p')+'_'+Date.now()+'.jpg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast('IMAGE SAVED');
  },'image/jpeg',0.94);
}

function showToast(msg){toast.textContent=msg;toast.style.opacity='1';clearTimeout(ttmr);ttmr=setTimeout(()=>toast.style.opacity='0',2000);}

ssBtn.onclick=initCam;
gridBtn.onclick=()=>{gridOn=!gridOn;gridBtn.classList.toggle('on',gridOn)};
safeBtn.onclick=()=>{safeOn=!safeOn;safeBtn.classList.toggle('on',safeOn)};
flareBtn.onclick=()=>{flareOn=!flareOn;flareBtn.classList.toggle('on',flareOn);updateStreak()};
flipBtn.onclick=()=>{facing=facing==='environment'?'user':'environment';if(stream)initCam()};
capBtn.onclick=capture;

wrap.addEventListener('click',e=>{
  if(e.target.closest('button'))return;
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  const x=e.clientX,y=e.clientY;
  if(x>=m.aL&&x<=m.aL+m.aW&&y>=bh&&y<=m.H-bh){
    focus.style.left=x+'px';focus.style.top=y+'px';focus.style.opacity='1';
    clearTimeout(ftmr);ftmr=setTimeout(()=>focus.style.opacity='0',1400);
  }
});

const onResize=()=>{needSz=true;updateBars();updateStreak();};
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>setTimeout(onResize,350));
applyFmt();updateBars();draw();
</script>

</body>
