<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cinemascopome">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Cinemascopome</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,200;0,300;0,400;0,600;0,700;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* Font fallback: if Google Fonts fails, use system fonts */
:root { font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;height:100dvh;background:#000;overflow:hidden}
#wrap{position:fixed;inset:0;height:100vh;height:100dvh;background:#000;overflow:hidden;display:flex;flex-direction:column}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transition:opacity .1s}
video.mirror{transform:scaleX(-1)}
canvas{position:absolute;inset:0;z-index:3;pointer-events:none}

/* TOP BAR */
#top-bar{position:relative;z-index:10;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 18px 6px;background:#0e0e0e;border-bottom:1px solid rgba(255,255,255,.06)}
.top-left{display:flex;flex-direction:column;gap:1px}
.top-fmt-lbl{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:8px;letter-spacing:.22em;color:rgba(255,255,255,.35)}
.top-fmt-name{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:700;font-size:16px;letter-spacing:.1em;color:#F5C400;line-height:1}
.top-center{display:flex;align-items:center;gap:4px}
.dot{width:5px;height:5px;border-radius:50%;background:#F5C400;animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}
.live{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.14em}
.top-right{display:flex;flex-direction:column;align-items:flex-end}
.top-ratio{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:700;font-size:18px;line-height:1;letter-spacing:.04em;color:#F5C400}
.top-ratio-lbl{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:200;font-size:7px;letter-spacing:.18em;color:rgba(255,255,255,.26)}

/* VIEWFINDER */
#viewfinder{position:relative;z-index:2;flex:1;min-height:0}

/* BOTTOM CARD */
#card{position:relative;z-index:10;flex-shrink:0;background:#0e0e0e;border-radius:16px 16px 0 0;border-top:1px solid rgba(245,196,0,.2);padding-bottom:max(env(safe-area-inset-bottom,0px),4px)}
/* Block any video bleed below card */
#card::after{content:’’;position:absolute;top:100%;left:0;right:0;height:200px;background:#0e0e0e;z-index:1}
#card::before{content:’’;display:block;width:32px;height:3px;border-radius:2px;background:rgba(255,255,255,.1);margin:8px auto 0}

/* TAB BAR */

/* CAMERA PANEL */
#panel-cam{}
#lens-row{display:none;align-items:center;justify-content:center;gap:6px;padding:6px 18px 0}
.lens-btn{padding:4px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;color:rgba(255,255,255,.32);cursor:pointer;-webkit-appearance:none;transition:.15s}
.lens-btn.on{border-color:#F5C400;background:rgba(245,196,0,.11);color:#F5C400}
.lens-btn:active{opacity:.5}
#zoom-row{display:none;align-items:center;gap:10px;padding:6px 20px 0}
.zoom-val{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:10px;color:#F5C400;letter-spacing:.06em;min-width:32px;text-align:right;flex-shrink:0}
input[type=range].styled{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(255,255,255,.15);border-radius:2px;outline:none;cursor:pointer}
input[type=range].styled::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#F5C400;border:2px solid rgba(255,255,255,.5);cursor:pointer}
.zoom-icon{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:9px;color:rgba(255,255,255,.3);flex-shrink:0}
.pill-row{display:flex;align-items:stretch;margin:6px 0 0;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05)}
.pill{flex:1;padding:7px 0;text-align:center;position:relative;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:400;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.2);background:none;border:none;border-right:1px solid rgba(255,255,255,.05);cursor:pointer;-webkit-appearance:none;transition:.15s}
.pill:last-child{border-right:none}
.pill.on{color:#F5C400;background:rgba(245,196,0,.11)}
.pill.on::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:2px;background:#F5C400}
.pill:active{opacity:.5}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px}
.cgrp{display:flex;align-items:center;gap:5px}
.cctr{display:flex;flex-direction:column;align-items:center;gap:3px}
.chint{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:7px;letter-spacing:.12em;color:rgba(255,255,255,.2)}
.ib{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:7px 5px 5px;cursor:pointer;-webkit-appearance:none;color:rgba(255,255,255,.45);min-width:44px;position:relative;transition:.15s}
.ib.on{color:#F5C400!important;border-color:rgba(245,196,0,.45)!important;background:rgba(245,196,0,.1)!important}
.ib:active{opacity:.4}
.il{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:400;font-size:7px;letter-spacing:.08em;color:inherit;white-space:nowrap}
.badge{position:absolute;top:-2px;right:-2px;min-width:15px;height:15px;border-radius:8px;padding:0 3px;background:#F5C400;color:#fff;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:700;font-size:8px;display:none;align-items:center;justify-content:center;letter-spacing:0;z-index:2}
#cap{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;-webkit-appearance:none}
.sh{width:60px;height:60px;border-radius:50%;position:relative}
.sh-ring{position:absolute;inset:0;border-radius:50%;border:2.5px solid rgba(255,255,255,.5)}
.sh-core{position:absolute;inset:5px;border-radius:50%;background:rgba(255,255,255,.86);transition:.1s}
#cap:active .sh-ring{border-color:#F5C400}
#cap:active .sh-core{transform:scale(.8);background:rgba(245,196,0,.3)}
.sl{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:7px;letter-spacing:.18em;color:rgba(255,255,255,.18)}

/* ── FILTER PANEL ── */

/* Slider track colors */
#grain-sl{background:linear-gradient(to right,rgba(245,196,0,.5) 0%,rgba(255,255,255,.12) 0%)}
#ca-sl{background:linear-gradient(to right,rgba(245,196,0,.5) 0%,rgba(255,255,255,.12) 0%)}
#dist-sl{background:rgba(255,255,255,.12)}

/* Filter active badge on tab */

/* MISC */
#focus{position:absolute;width:50px;height:50px;margin:-25px 0 0 -25px;z-index:6;pointer-events:none;opacity:0;transition:opacity .4s}
.fc{position:absolute;width:9px;height:9px;border-color:#F5C400;border-style:solid}
.fc.tl{top:0;left:0;border-width:1.5px 0 0 1.5px}
.fc.tr{top:0;right:0;border-width:1.5px 1.5px 0 0}
.fc.bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.fc.br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}
#flash{position:absolute;inset:0;background:#fff;z-index:99;opacity:0;pointer-events:none}
#toast{position:absolute;left:50%;transform:translateX(-50%);background:#1e1e1e;color:#F5C400;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;padding:9px 18px;z-index:90;opacity:0;white-space:nowrap;border:1.5px solid #F5C400;border-radius:6px;transition:opacity .2s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#nocam{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;display:none;pointer-events:none}
.nocam-txt{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.3);line-height:2}

/* SETTINGS */
#settings{position:absolute;inset:0;z-index:50;background:#0a0a0a;display:none;flex-direction:column}
.set-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.set-title{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:700;font-size:17px;letter-spacing:.14em;color:#fff}
.set-close{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.set-close:active{opacity:.5}
.set-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px}
.set-section{margin-bottom:28px}
.set-sec-title{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:9px;letter-spacing:.24em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)}
.set-options{display:flex;flex-direction:column;gap:2px}
.set-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);cursor:pointer;-webkit-appearance:none;transition:.15s;width:100%}
.set-opt.on{border-color:rgba(245,196,0,.28);background:rgba(245,196,0,.11)}
.set-opt:active{opacity:.6}
.set-opt-left{display:flex;flex-direction:column;gap:3px;text-align:left}
.set-opt-name{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:13px;letter-spacing:.08em;color:rgba(255,255,255,.75)}
.set-opt.on .set-opt-name{color:#F5C400}
.set-opt-desc{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.28);line-height:1.5}
.set-opt-badge{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:9px;letter-spacing:.08em;padding:3px 8px;border-radius:3px;border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.35)}
.set-opt.on .set-opt-badge{border-color:rgba(245,196,0,.28);color:#F5C400;background:rgba(245,196,0,.11)}
.set-fname{margin-top:8px;padding:12px 14px;border-radius:8px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06)}
.set-fname-lbl{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.28);margin-bottom:6px}
.set-fname-val{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:9px;letter-spacing:.04em;color:#F5C400;line-height:1.7;word-break:break-all}

/* GALLERY */
#gallery{position:absolute;inset:0;z-index:50;background:#0a0a0a;display:none;flex-direction:column}
.gal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;background:#1a1a1a}
.gal-title{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:700;font-size:17px;letter-spacing:.14em;color:#fff}
.gal-count{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:10px;letter-spacing:.14em;color:rgba(255,255,255,.3)}
.gal-close{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.gal-close:active{opacity:.5}
.gal-save-all{padding:6px 12px;border:1px solid rgba(245,196,0,.4);background:none;color:#F5C400;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:10px;letter-spacing:.14em;cursor:pointer;-webkit-appearance:none;border-radius:4px}
.gal-save-all:active{background:rgba(245,196,0,.12)}
#gal-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;align-content:start}
.gal-thumb{position:relative;aspect-ratio:2.39/1;background:#1a1a1a;cursor:pointer;overflow:hidden}
.gal-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.gal-thumb-info{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:rgba(0,0,0,.6);display:flex;justify-content:space-between;align-items:center}
.gal-thumb-fmt{font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:7px;letter-spacing:.08em;color:#F5C400}
.gal-thumb-cs{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:7px;color:rgba(255,255,255,.4)}
.gal-thumb:active{opacity:.7}
.gal-empty{grid-column:1/-1;padding:50px 0;text-align:center;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:11px;letter-spacing:.18em;color:rgba(255,255,255,.2);line-height:2}
#gal-detail{position:absolute;inset:0;background:#000;z-index:51;display:none;flex-direction:column}
.gal-detail-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:#1a1a1a;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08)}
.gal-back{background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;-webkit-appearance:none;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:300;font-size:12px;letter-spacing:.1em}
.gal-back:active{opacity:.5}
.gal-save-btn{padding:7px 18px;border:1px solid rgba(245,196,0,.28);background:none;color:#F5C400;font-family:‘Noto Sans’,-apple-system,BlinkMacSystemFont,‘Helvetica Neue’,sans-serif;font-weight:600;font-size:11px;letter-spacing:.14em;cursor:pointer;-webkit-appearance:none}
.gal-save-btn:active{background:rgba(245,196,0,.11)}
#gal-detail-img{flex:1;object-fit:contain;width:100%;min-height:0}
.gal-detail-info{padding:10px 18px 14px;background:rgba(0,0,0,.7);flex-shrink:0}
.gal-detail-fname{font-family:‘Share Tech Mono’,‘Courier New’,monospace;font-size:8px;letter-spacing:.04em;color:rgba(255,255,255,.35);line-height:1.8;word-break:break-all}
</style>

</head>

<script>
// ── CONSTANTS ──────────────────────────────────────────────
const FMTS=[
  {r:1.33,l:'1.33',n:'ACADEMY'},
  {r:1.78,l:'1.78',n:'HDTV_16-9'},
  {r:1.85,l:'1.85',n:'FLAT'},
  {r:2.39,l:'2.39',n:'CINEMASCOPE'},
  {r:2.76,l:'2.76',n:'ULTRA70'},
];
const MASK_MODES=[{label:'Off',icon:'◻',alpha:0},{label:'Dim',icon:'◑',alpha:0.62},{label:'Black',icon:'◼',alpha:1.0}];
const LENS_PRESETS=[{label:'0.5×',zoom:.5},{label:'1×',zoom:1},{label:'2×',zoom:2},{label:'3×',zoom:3}];
const CA='rgba(245,196,0,';
const C='#F5C400', CA='rgba(245,196,0,';

// ── STATE ───────────────────────────────────────────────────
let fi=3, maskMode=2, facing='environment', stream=null;
let gridOn=false, safeOn=false;
let currentZoom=1, zoomCap=null, zoomMin=1, zoomMax=1;
let imageCapture=null;

let needSz=true, ftmr=null, ttmr=null;
let expVal=0;
const photos=[];

FMTS.forEach((f,i)=>{
  const b=document.createElement('button');
  b.className='pill'+(i===fi?' on':'');
  b.textContent=f.l;b.onclick=()=>{fi=i;applyFmt();updateFnamePreview()};
  pillBox.appendChild(b);
});
function applyFmt(){
  const f=FMTS[fi];fn.textContent=f.n.replace(/_/g,' ');rl.textContent=f.l;
  pillBox.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===fi));
}

// ── METRICS ─────────────────────────────────────────────────
function getM(){
  const W=window.innerWidth,H=window.innerHeight;
  const tH=topBar.offsetHeight||52,cH=card.offsetHeight||180;
  const fH=H-tH-cH,fT=tH;
  const r=FMTS[fi].r,ah=W/r;
  if(ah<=fH){const ex=(fH-ah)/2;return{W,H,aW:W,aH:ah,aT:fT+ex,aL:0,tH,cH};}
  const aw=fH*r;return{W,H,aW:aw,aH:fH,aT:fT,aL:(W-aw)/2,tH,cH};
}

// ── CAMERA ──────────────────────────────────────────────────
async function initCam(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const tries=[{facingMode:{ideal:facing},width:{ideal:65535},height:{ideal:65535}},{facingMode:{ideal:facing}},true];
  for(const c of tries){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:c,audio:false});
      vid.srcObject=stream;vid.classList.toggle('mirror',facing==='user');
      await vid.play();nocam.style.display='none';checkLens();
      // ImageCapture for native full-resolution still
      try{
        const track=stream.getVideoTracks()[0];
        if(track&&typeof ImageCapture!=='undefined'){
          imageCapture=new ImageCapture(track);
        }
      }catch(e){imageCapture=null;}
      return;
    }catch{}
  }
  nocam.style.display='block';
}
function checkLens(){
  if(!stream)return;
  const track=stream.getVideoTracks()[0];if(!track)return;
  try{
    const cap=track.getCapabilities();
    if(cap&&cap.zoom&&cap.zoom.max>1.2){
      zoomCap=cap.zoom;zoomMin=cap.zoom.min||1;zoomMax=cap.zoom.max||3;
      buildLensUI();buildZoomSlider();
    }
  }catch{}
}
function buildLensUI(){
  const avail=LENS_PRESETS.filter(p=>p.zoom>=zoomMin*.8&&p.zoom<=zoomMax*1.1);
  if(avail.length<2)return;
  lensRow.innerHTML='';lensRow.style.display='flex';
  avail.forEach(p=>{
    const b=document.createElement('button');
    b.className='lens-btn'+(Math.abs(p.zoom-currentZoom)<.01?' on':'');
    b.textContent=p.label;b.dataset.zoom=p.zoom;b.onclick=()=>setZoom(p.zoom);lensRow.appendChild(b);
  });
}
function buildZoomSlider(){
  zoomSlider.min=Math.round(zoomMin*10);
  zoomSlider.max=Math.round(zoomMax*10);
  zoomSlider.value=Math.round(currentZoom*10);
  zoomRow.style.display='flex';
}
async function setZoom(z){
  if(!stream||!zoomCap)return;
  const track=stream.getVideoTracks()[0];if(!track)return;
  try{
    z=Math.max(zoomMin,Math.min(zoomMax,z));
    await track.applyConstraints({advanced:[{zoom:z}]});
    currentZoom=z;zoomVal.textContent=z.toFixed(1)+'×';
    zoomSlider.value=Math.round(z*10);
    lensRow.querySelectorAll('.lens-btn').forEach(b=>b.classList.toggle('on',Math.abs(parseFloat(b.dataset.zoom)-z)<.15));
  }catch(e){}
}
zoomSlider.addEventListener('input',()=>setZoom(parseInt(zoomSlider.value)/10));


// ── DRAW ────────────────────────────────────────────────────
let _ld=0;
function updateBars(){
  const m=getM();
  const lbT=document.getElementById('lb-t');
  const lbB=document.getElementById('lb-b');
  const lbL=document.getElementById('lb-l');
  const lbR=document.getElementById('lb-r');
  if(!lbT)return;
  // Top black bar: from topBar bottom → frame top
  const topH=Math.max(0, m.aT - m.tH);
  lbT.style.top = m.tH + 'px';
  lbT.style.height = topH + 'px';
  // Bottom black bar: from frame bottom → card top
  const botStart = m.aT + m.aH;
  const botH = Math.max(0, (m.H - m.cH) - botStart);
  lbB.style.bottom = m.cH + 'px';
  lbB.style.height = botH + 'px';
  // Pillarbox L/R (for wide-screen formats in landscape)
  if(m.aL > 0){
    lbL.style.width = m.aL + 'px';
    lbR.style.width = (m.W - m.aL - m.aW) + 'px';
    lbL.style.top = m.tH + 'px'; lbL.style.bottom = m.cH + 'px';
    lbR.style.top = m.tH + 'px'; lbR.style.bottom = m.cH + 'px';
  } else {
    lbL.style.width = '0'; lbR.style.width = '0';
  }
}
function draw(ts){
  const W=window.innerWidth,H=window.innerHeight;
  if(document.hidden){requestAnimationFrame(draw);return;}
  if(ts&&_ld&&(ts-_ld)<42){requestAnimationFrame(draw);return;}
  if(ts)_ld=ts;
  if(needSz){cv.width=W;cv.height=H;needSz=false;}
  ctx.clearRect(0,0,W,H);
  const m=getM();
  const{aT,aH,aL,aW,tH,cH}=m;
  const aR=aL+aW,aB=aT+aH,pad=10;


  // ── VIGNETTE ────────────────────────────────────────────
  const vg=ctx.createRadialGradient(aL+aW/2,aT+aH/2,aH*.18,aL+aW/2,aT+aH/2,aH*.76);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle=vg;ctx.fillRect(aL,aT,aW,aH);

  // ── CORNER BRACKETS ─────────────────────────────────────
  const cs=20,cr=4;
  ctx.strokeStyle=C;ctx.lineWidth=2;ctx.setLineDash([]);
  [[aL,aT,1,1],[aR,aT,-1,1],[aL,aB,1,-1],[aR,aB,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(x+dx*cs,y);ctx.lineTo(x+dx*cr,y);
    ctx.quadraticCurveTo(x,y,x,y+dy*cr);ctx.lineTo(x,y+dy*cs);ctx.stroke();
  });
  ctx.strokeStyle=CA+'0.1)';ctx.lineWidth=0.7;
  ctx.strokeRect(aL+.5,aT+.5,aW-1,aH-1);

  // ── CENTER FOCUS BRACKET ─────────────────────────────────
  const fcW=aW*.12,fcH=aH*.14;
  const fcX=aL+aW/2-fcW/2,fcY=aT+aH/2-fcH/2,fcs=8,fcr2=3;
  ctx.strokeStyle=CA+'0.7)';ctx.lineWidth=1.2;
  [[fcX,fcY,1,1],[fcX+fcW,fcY,-1,1],[fcX,fcY+fcH,1,-1],[fcX+fcW,fcY+fcH,-1,-1]].forEach(([x,y,dx,dy])=>{
    ctx.beginPath();ctx.moveTo(x+dx*fcs,y);ctx.lineTo(x+dx*fcr2,y);
    ctx.quadraticCurveTo(x,y,x,y+dy*fcr2);ctx.lineTo(x,y+dy*fcs);ctx.stroke();
  });
  ctx.fillStyle=CA+'0.55)';ctx.beginPath();ctx.arc(aL+aW/2,aT+aH/2,2,0,Math.PI*2);ctx.fill();

  // ── LEFT EXPOSURE METER ──────────────────────────────────
  const mX=aL+pad+6;
  const mTop=aT+aH*.3,mBot=aT+aH*.7,mH=mBot-mTop;
  ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(mX,mTop);ctx.lineTo(mX,mBot);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.3)';
  ctx.beginPath();ctx.moveTo(mX-4,aT+aH/2);ctx.lineTo(mX+4,aT+aH/2);ctx.stroke();
  for(let t=-2;t<=2;t++){if(t===0)continue;const ty=aT+aH/2+t*(mH/4.5);ctx.strokeStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.moveTo(mX-2,ty);ctx.lineTo(mX+2,ty);ctx.stroke();}
  ctx.fillStyle=expVal===0?'rgba(255,255,255,.72)':C;ctx.fillRect(mX-3,aT+aH/2+expVal*(mH/4.5)-2,6,4);
  ctx.font='7px "Share Tech Mono"';ctx.fillStyle='rgba(255,255,255,.28)';ctx.textAlign='left';
  ctx.fillText('+2',mX+6,mTop+5);ctx.fillText('-2',mX+6,mBot+3);

  const bY=aB-pad-2;
  ctx.strokeStyle=CA+'0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(aL+aW/2,bY-5);ctx.lineTo(aL+aW/2,bY);ctx.stroke();
    ctx.textAlign='left';
  updateBars();
  requestAnimationFrame(draw);
}

// ── FILENAME ────────────────────────────────────────────────
function buildFilename(ext){
  const now=new Date();
  const d=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const t=`${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
  const fmtStr=FMTS[fi].n;
  const ratio=FMTS[fi].l.replace('.','p');
  const cs=capCs.label;
  const fx='';
  return `SCOPE_${fmtStr}_${ratio}_${cs}${fx}_${d}_${t}.${ext||capFmt.ext}`;
}
function updateFnamePreview(){fnamePreview.textContent=buildFilename();}

// ── CAPTURE ─────────────────────────────────────────────────
function capture(){
  const vW=vid.videoWidth,vH=vid.videoHeight;
  if(!vW||!vH){showToast('NO VIDEO');return;}
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{flash.style.transition='opacity .12s';flash.style.opacity='0';},80);
  doCapture(new Date());
}

// Map viewfinder active area → exact video pixel coordinates
function getVideoCropRect(){
  const W=window.innerWidth,H=window.innerHeight;
  const vW=vid.videoWidth,vH=vid.videoHeight;
  const m=getM();
  const scale=Math.max(W/vW,H/vH);
  const ox=(W-vW*scale)/2, oy=(H-vH*scale)/2;
  const sx=(m.aL-ox)/scale, sy=(m.aT-oy)/scale;
  const sw=m.aW/scale, sh=m.aH/scale;
  return{sx,sy,sw,sh,outW:Math.round(sw),outH:Math.round(sh)};
}

async function doCapture(now){
  const vW=vid.videoWidth,vH=vid.videoHeight;
  // Try ImageCapture for sensor-native resolution
  if(imageCapture&&typeof imageCapture.takePhoto==='function'){
    try{
      const blob=await imageCapture.takePhoto();
      const bitmap=await createImageBitmap(blob);
      const pW=bitmap.width,pH=bitmap.height;
      // Scale crop rect from video coords to photo coords
      const vc=getVideoCropRect();
      const sX=pW/vW, sY=pH/vH;
      const cX=Math.max(0,Math.round(vc.sx*sX));
      const cY=Math.max(0,Math.round(vc.sy*sY));
      const cW=Math.min(Math.round(vc.sw*sX),pW-cX);
      const cH=Math.min(Math.round(vc.sh*sY),pH-cY);
      const out=document.createElement('canvas');
      out.width=cW;out.height=cH;
      let oc;try{oc=out.getContext('2d',{colorSpace:capCs.cs});}catch{oc=out.getContext('2d');}
      if(facing==='user'){oc.translate(cW,0);oc.scale(-1,1);}
      oc.drawImage(bitmap,cX,cY,cW,cH,0,0,cW,cH);
      bitmap.close();
      await finalizeCrop(out,cW,cH,now);
      return;
    }catch(e){}
  }
  // Fallback: draw from video stream
  const vc=getVideoCropRect();
  const out=document.createElement('canvas');
  out.width=vc.outW;out.height=vc.outH;
  let oc;try{oc=out.getContext('2d',{colorSpace:capCs.cs});}catch{oc=out.getContext('2d');}
  if(facing==='user'){oc.translate(vc.outW,0);oc.scale(-1,1);}
  oc.drawImage(vid,vc.sx,vc.sy,vc.sw,vc.sh,0,0,vc.outW,vc.outH);
  await finalizeCrop(out,vc.outW,vc.outH,now);
}

async function finalizeCrop(canvas,w,h,now){
  const fname=buildFilename();
  canvas.toBlob(async rawBlob=>{
    if(!rawBlob)return;
    let finalBlob=rawBlob;
    if(capFmt.mime==='image/jpeg'){
      try{finalBlob=await addExifToJpeg(rawBlob,{width:w,height:h,datetime:formatExifDate(now),software:'Cinemascopome',description:FMTS[fi].n+' '+FMTS[fi].l+':1 '+capCs.label,userComment:'Cinemascopome Format:'+FMTS[fi].n+' Ratio:'+FMTS[fi].l+' CS:'+capCs.label});}catch(e){}
    }
    const url=URL.createObjectURL(finalBlob);
    photos.push({url,blob:finalBlob,fmt:FMTS[fi].l,fmtName:FMTS[fi].n,cs:capCs.label,fname,res:w+'×'+h,time:now.getTime()});
    if(photos.length>50){URL.revokeObjectURL(photos[0].url);photos.shift();}
    updateBadge();
    showInstantShareToast(photos[photos.length-1],w+'×'+h);
  },capFmt.mime,capFmt.mime==='image/jpeg'?0.96:undefined);
}

function formatExifDate(d){
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+':'+p(d.getMonth()+1)+':'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

// ── EXIF WRITER (minimal TIFF/JPEG APP1) ──────────────────
function buildExifBuffer(info){
  const L2=v=>[v&255,(v>>8)&255];
  const L4=v=>[v&255,(v>>8)&255,(v>>16)&255,(v>>24)&255];
  const asc=s=>[...(s||'')].map(c=>c.charCodeAt(0)).concat([0]);
  const pad2=a=>{if(a.length%2)a.push(0);return a;};
  // Strings (padded to even length)
  const make =pad2(asc('Apple'));
  const model=pad2(asc('iPhone'));
  const sw   =pad2(asc(info.software||'Cinemascopome'));
  const desc =pad2(asc(info.description||'Cinemascopome'));
  const dt   =asc(info.datetime||'2000:01:01 00:00:00'); // 20 bytes
  const ucRaw=info.userComment||'';
  const uc   =pad2([65,83,67,73,73,0,0,0,...[...ucRaw].map(c=>c.charCodeAt(0))]);

  // Layout (all offsets relative to TIFF header start = 0)
  const IFD0_OFF=8;
  const IFD0_N=6;
  const IFD0_SZ=2+IFD0_N*12+4;
  let dp=IFD0_OFF+IFD0_SZ;
  // IFD0 data positions
  const makeOff =dp;dp+=make.length;
  const modelOff=dp;dp+=model.length;
  const swOff   =dp;dp+=sw.length;
  const descOff =dp;dp+=desc.length;
  const dtOff   =dp;dp+=dt.length;
  // ExifIFD
  const EXIF_OFF=dp;
  const EXIF_N=6;
  const EXIF_SZ=2+EXIF_N*12+4;
  dp+=EXIF_SZ;
  const dt2Off=dp;dp+=dt.length;
  const ucOff =dp;dp+=uc.length;

  const b=[];
  // TIFF header (little-endian)
  b.push(0x49,0x49,0x2A,0x00,...L4(IFD0_OFF));
  // IFD0 (sorted by tag)
  b.push(...L2(IFD0_N));
  for(const [tag,type,cnt,val] of [
    [0x010E,2,desc.length,descOff], // ImageDescription
    [0x010F,2,make.length,makeOff], // Make
    [0x0110,2,model.length,modelOff], // Model
    [0x0131,2,sw.length,swOff],     // Software
    [0x0132,2,dt.length,dtOff],     // DateTime
    [0x8769,4,1,EXIF_OFF],          // ExifIFD
  ]) b.push(...L2(tag),...L2(type),...L4(cnt),...L4(val));
  b.push(0,0,0,0);
  b.push(...make,...model,...sw,...desc,...dt);
  // ExifIFD (sorted by tag)
  b.push(...L2(EXIF_N));
  for(const [tag,type,cnt,val] of [
    [0x9000,7,4,0x30323230],           // ExifVersion "0220"
    [0x9003,2,dt.length,dt2Off],       // DateTimeOriginal
    [0x9004,2,dt.length,dt2Off],       // DateTimeDigitized
    [0x9286,7,uc.length,ucOff],        // UserComment
    [0xA002,4,1,info.width||0],        // PixelXDimension
    [0xA003,4,1,info.height||0],       // PixelYDimension
  ]) b.push(...L2(tag),...L2(type),...L4(cnt),...L4(val));
  b.push(0,0,0,0);
  b.push(...dt,...uc);
  return new Uint8Array(b);
}

async function addExifToJpeg(blob,info){
  const tiff=buildExifBuffer(info);
  const exifHeader=[0x45,0x78,0x69,0x66,0x00,0x00]; // "Exif"
  const segLen=2+exifHeader.length+tiff.length; // includes 2-byte length field
  const orig=new Uint8Array(await blob.arrayBuffer());
  const out=new Uint8Array(2+2+segLen+orig.length-2);
  let p=0;
  // SOI
  out[p++]=0xFF;out[p++]=0xD8;
  // APP1
  out[p++]=0xFF;out[p++]=0xE1;
  out[p++]=(segLen>>8)&0xFF;out[p++]=segLen&0xFF;
  for(const b of exifHeader)out[p++]=b;
  tiff.forEach(b=>out[p++]=b);
  // Rest of JPEG (skip original SOI FF D8)
  orig.slice(2).forEach(b=>out[p++]=b);
  return new Blob([out],{type:'image/jpeg'});
}

// ── MASK ────────────────────────────────────────────────────
const _MS=['<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><ellipse cx="9" cy="9" rx="8" ry="5.5" stroke="currentColor" stroke-width="1.3"/><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/></svg>','<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9C3.5 4 14.5 4 17 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M1 9C3.5 13.5 14.5 13.5 17 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity=".35" stroke-dasharray="3 2"/><circle cx="9" cy="9" r="2.5" fill="currentColor" opacity=".55"/></svg>','<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9C3.5 4 14.5 4 17 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="2.5" y1="15.5" x2="15.5" y2="2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'];
function _um(){const e=document.getElementById('mask-svg');if(e)e.innerHTML=_MS[maskMode];const l=document.getElementById('mask-lbl');if(l)l.textContent=MASK_MODES[maskMode].label;maskBtn.classList.toggle('on',maskMode>0);}
function cycleMask(){
  maskMode=(maskMode+1)%3;
  // DIM: semi-transparent bars (rgba with alpha)
  const bars=['lb-t','lb-b','lb-l','lb-r'];
  bars.forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(maskMode===0){el.style.background='transparent';}
    else if(maskMode===1){el.style.background='rgba(0,0,0,0.62)';}
    else{el.style.background='#000';}
  });
  // Reset video filter
  vid.style.filter='';
  _um();
  showToast(maskMode===0?'MASK OFF':maskMode===1?'DIM':'BLACK');
}

// Settings — format selection

// ── GALLERY ─────────────────────────────────────────────────
function updateBadge(){
  const n=photos.length;badge.textContent=n>99?'99+':n;badge.style.display=n>0?'flex':'none';
  galCount.textContent=n+' PHOTO'+(n!==1?'S':'');
}
function openGallery(){gallery.style.display='flex';renderGrid();}
function closeGallery(){gallery.style.display='none';galDetail.style.display='none';}
function renderGrid(){
  galGrid.innerHTML='';
  if(!photos.length){galGrid.innerHTML='<div class="gal-empty">NO PHOTOS YET<br>TAP CAPTURE TO SHOOT</div>';return;}
  [...photos].reverse().forEach((p,ri)=>{
    const idx=photos.length-1-ri;
    const div=document.createElement('div');div.className='gal-thumb';
    const img=document.createElement('img');img.src=p.url;img.loading='lazy';
    const info=document.createElement('div');info.className='gal-thumb-info';
    info.innerHTML=`<span class="gal-thumb-fmt">${p.fmtName}</span><span class="gal-thumb-cs">${p.cs}</span>`;
    div.appendChild(img);div.appendChild(info);div.onclick=()=>openDetail(idx);
    galGrid.appendChild(div);
  });
}
function openDetail(idx){
  detailIdx=idx;const p=photos[idx];
  galDetailImg.src=p.url;galDetailFname.textContent=p.fname;
  galDetail.style.display='flex';galDetail.style.flexDirection='column';
}
// Share single photo via Web Share API → iOS「写真に保存」
async function sharePhoto(p){
  if(!p)return;
  if(navigator.canShare&&navigator.canShare({files:[new File([p.blob],p.fname,{type:p.blob.type})]})){
    try{
      await navigator.share({
        files:[new File([p.blob],p.fname,{type:p.blob.type})],
        title:'Cinemascopome'
      });
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  // Fallback: download
  const a=document.createElement('a');a.href=p.url;a.download=p.fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function doSave(){
  if(detailIdx===null)return;
  sharePhoto(photos[detailIdx]);
}

// Share all photos at once (bulk)
async function shareAll(){
  if(!photos.length){showToast('NO PHOTOS');return;}
  const files=photos.map(p=>new File([p.blob],p.fname,{type:p.blob.type}));
  if(navigator.canShare&&navigator.canShare({files})){
    try{
      await navigator.share({files,title:'Cinemascopome'});
      return;
    }catch(e){if(e.name==='AbortError')return;}
  }
  // Fallback: download one by one
  for(const p of photos){
    const a=document.createElement('a');a.href=p.url;a.download=p.fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    await new Promise(r=>setTimeout(r,300));
  }
}
function showToast(msg){
  toast.innerHTML=msg;
  toast.style.cursor='default';
  toast.onclick=null;
  toast.style.bottom=(card.offsetHeight+8)+'px';
  toast.style.opacity='1';
  clearTimeout(ttmr);ttmr=setTimeout(()=>toast.style.opacity='0',1800);
}

function showInstantShareToast(photo, resStr){
  toast.innerHTML=resStr+' &nbsp;<span style="color:#fff;opacity:.6">|</span>&nbsp; <span style="text-decoration:underline;cursor:pointer">写真に保存</span>';
  toast.style.bottom=(card.offsetHeight+8)+'px';
  toast.style.opacity='1';
  toast.style.cursor='pointer';
  toast.onclick=()=>{sharePhoto(photo);toast.style.opacity='0';};
  clearTimeout(ttmr);ttmr=setTimeout(()=>{toast.style.opacity='0';toast.onclick=null;},4000);
}

// ── EVENTS ──────────────────────────────────────────────────
wrap.addEventListener('click',e=>{
  if(e.target.closest('button')||e.target.closest('#card')||e.target.closest('#gallery')||e.target.closest('#settings'))return;
  if(!stream){initCam();return;}
  const m=getM(),x=e.clientX,y=e.clientY;
  if(x>=m.aL&&x<=m.aL+m.aW&&y>=m.aT&&y<=m.aT+m.aH){
    focus.style.left=x+'px';focus.style.top=y+'px';focus.style.opacity='1';
    clearTimeout(ftmr);ftmr=setTimeout(()=>focus.style.opacity='0',1400);
  }
});
gridBtn.onclick=()=>{gridOn=!gridOn;gridBtn.classList.toggle('on',gridOn)};
safeBtn.onclick=()=>{safeOn=!safeOn;safeBtn.classList.toggle('on',safeOn)};

setBtn.onclick=openSettings;
setClose.onclick=closeSettings;
galClose.onclick=closeGallery;
document.getElementById('gal-save-all').onclick=shareAll;
galBack.onclick=()=>galDetail.style.display='none';
galSaveBtnEl.onclick=doSave;

const onResize=()=>{needSz=true};
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>setTimeout(onResize,400));

_um();
applyFmt();draw();initCam();updateFnamePreview();
