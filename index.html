<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SCOPE CAM">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>SCOPE CAM</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
:root{
  --a:#e8a030;--a2:rgba(232,160,48,.12);--a3:rgba(232,160,48,.22);
  --r:#e03333;--m:'Share Tech Mono',monospace;--s:'Barlow Condensed',sans-serif;
}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
#wrap{width:100%;height:100vh;background:#000;position:relative;overflow:hidden;font-family:var(--m)}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
video.mirror{transform:scaleX(-1)}
canvas{position:absolute;inset:0;z-index:3;pointer-events:none}
.bar{position:absolute;left:0;width:100%;background:#000;z-index:10;display:flex;flex-direction:column}
#bt{top:0}
#bb{bottom:0}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0}
.fn{font:700 17px/1 var(--s);letter-spacing:.18em;color:var(--a)}
.rec{display:flex;align-items:center;gap:5px;font:10px var(--m);color:rgba(255,255,255,.5);letter-spacing:.12em}
.dot{width:6px;height:6px;border-radius:50%;background:var(--r);animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.1}}
.rl{font:11px var(--m);color:var(--a);letter-spacing:.06em;text-align:right}
.rn{font:8px var(--m);color:rgba(255,255,255,.28);letter-spacing:.08em;text-align:right;margin-top:2px}
.pills{display:flex;gap:5px;padding:8px 16px 10px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 11px;border:1px solid var(--a3);background:none;color:rgba(255,255,255,.32);font:9px var(--m);letter-spacing:.09em;cursor:pointer;border-radius:2px;-webkit-appearance:none;transition:.15s}
.pill.on{border-color:var(--a);color:var(--a);background:var(--a2)}
.pill:active{opacity:.5}
.div{height:1px;background:rgba(255,255,255,.06)}
.ctrls{display:flex;align-items:center;justify-content:space-between;padding:12px 28px 14px}
.sbg{display:flex;align-items:center;gap:8px}
.bw{display:flex;flex-direction:column;align-items:center;gap:3px}
.bl2{font:8px var(--m);color:rgba(255,255,255,.28);letter-spacing:.09em}
.cb{width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(255,255,255,.26);background:rgba(255,255,255,.06);color:#fff;font-family:var(--m);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;transition:.15s}
.cb.on{border-color:var(--a);color:var(--a);background:var(--a2)}
.cb:active{opacity:.4;transform:scale(.9)}
#cap{width:70px;height:70px;border-radius:50%;border:3px solid rgba(255,255,255,.82);background:none;cursor:pointer;position:relative;-webkit-appearance:none;transition:.12s}
#cap::after{content:'';position:absolute;inset:5px;border-radius:50%;background:rgba(255,255,255,.82);transition:.12s}
#cap:active{transform:scale(.88)}
#cap:active::after{background:rgba(255,255,255,.25)}
#flash{position:absolute;inset:0;background:#fff;z-index:99;opacity:0;pointer-events:none}
#toast{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:var(--a);font:10px var(--m);letter-spacing:.1em;padding:7px 16px;border-radius:18px;z-index:90;opacity:0;white-space:nowrap;border:1px solid var(--a3);transition:opacity .2s}
#focus{position:absolute;width:56px;height:56px;margin:-28px 0 0 -28px;z-index:6;pointer-events:none;opacity:0;transition:opacity .4s}
.fc{position:absolute;width:11px;height:11px;border-color:var(--a);border-style:solid}
.fc.tl{top:0;left:0;border-width:1.5px 0 0 1.5px}
.fc.tr{top:0;right:0;border-width:1.5px 1.5px 0 0}
.fc.bl{bottom:0;left:0;border-width:0 0 1.5px 1.5px}
.fc.br{bottom:0;right:0;border-width:0 1.5px 1.5px 0}
#streak{position:absolute;left:0;width:100%;height:1px;z-index:4;pointer-events:none;background:linear-gradient(to right,transparent,rgba(150,210,255,.32) 30%,rgba(200,230,255,.6) 50%,rgba(150,210,255,.32) 70%,transparent);opacity:0}
#ss{position:absolute;inset:0;z-index:80;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
#ss-logo{font:700 28px/1 var(--s);letter-spacing:.22em;color:var(--a)}
#ss-sub{font:9px var(--m);color:rgba(255,255,255,.35);letter-spacing:.14em;text-align:center;line-height:2.2}
#ss-btn{margin-top:8px;padding:13px 30px;border:1.5px solid var(--a);background:none;color:var(--a);font:11px var(--m);letter-spacing:.16em;cursor:pointer;border-radius:2px;-webkit-appearance:none;transition:.15s}
#ss-btn:active{background:var(--a2)}
#ss-err{font:9px var(--m);color:rgba(255,80,80,.75);letter-spacing:.1em;text-align:center;display:none;padding:0 24px;line-height:2}
</style>
</head>
<body>
<div id="wrap">
  <video id="vid" autoplay playsinline muted webkit-playsinline></video>
  <canvas id="cv"></canvas>
  <div id="streak"></div>
  <div id="bt" class="bar">
    <div class="hrow">
      <div><div class="fn" id="fn">CINEMASCOPE</div></div>
      <div class="rec"><div class="dot"></div><span>LIVE</span></div>
      <div><div class="rl" id="rl">2.39:1</div><div class="rn" id="rn">ANAMORPHIC</div></div>
    </div>
    <div class="pills" id="pills"></div>
    <div class="div"></div>
  </div>
  <div id="bb" class="bar">
    <div class="ctrls">
      <div class="sbg">
        <div class="bw"><button class="cb" id="gridBtn">⊞</button><div class="bl2">GRID</div></div>
        <div class="bw"><button class="cb" id="safeBtn">▣</button><div class="bl2">SAFE</div></div>
      </div>
      <button id="cap"></button>
      <div class="sbg">
        <div class="bw"><button class="cb" id="flareBtn">≋</button><div class="bl2">FLARE</div></div>
        <div class="bw"><button class="cb" id="flipBtn">↻</button><div class="bl2">FLIP</div></div>
      </div>
    </div>
  </div>
  <div id="flash"></div>
  <div id="toast"></div>
  <div id="focus">
    <div class="fc tl"></div><div class="fc tr"></div>
    <div class="fc bl"></div><div class="fc br"></div>
  </div>
  <div id="ss">
    <div id="ss-logo">SCOPE CAM</div>
    <div id="ss-sub">CINEMASCOPE CAMERA<br>FOR FILM &amp; VFX</div>
    <button id="ss-btn">&#9654;&nbsp; START CAMERA</button>
    <div id="ss-err"></div>
  </div>
</div>
<script>
const FMTS=[
  {r:1.33,l:'1.33',n:'ACADEMY',   nt:'4:3 FULL'},
  {r:1.78,l:'1.78',n:'HDTV 16:9', nt:'DIGITAL HD'},
  {r:1.85,l:'1.85',n:'FLAT',      nt:'WIDESCREEN'},
  {r:2.39,l:'2.39',n:'CINEMASCOPE',nt:'ANAMORPHIC'},
  {r:2.76,l:'2.76',n:'ULTRA 70',  nt:'PANAVISION'},
];
const MIN_BAR=82;
let fi=3,facing='environment',stream=null;
let gridOn=false,safeOn=false,flareOn=false;
let needSz=true,ftmr=null,ttmr=null;
const wrap=document.getElementById('wrap');
const vid=document.getElementById('vid');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const bt=document.getElementById('bt');
const bb=document.getElementById('bb');
const fn=document.getElementById('fn');
const rl=document.getElementById('rl');
const rn=document.getElementById('rn');
const gridBtn=document.getElementById('gridBtn');
const safeBtn=document.getElementById('safeBtn');
const flareBtn=document.getElementById('flareBtn');
const flipBtn=document.getElementById('flipBtn');
const capBtn=document.getElementById('cap');
const flash=document.getElementById('flash');
const toast=document.getElementById('toast');
const focus=document.getElementById('focus');
const streak=document.getElementById('streak');
const ss=document.getElementById('ss');
const ssBtn=document.getElementById('ss-btn');
const ssErr=document.getElementById('ss-err');
const pillBox=document.getElementById('pills');
FMTS.forEach((f,i)=>{
  const b=document.createElement('button');
  b.className='pill'+(i===fi?' on':'');
  b.textContent=f.l;
  b.onclick=()=>{fi=i;applyFmt();updateBars();};
  pillBox.appendChild(b);
});
function applyFmt(){
  const f=FMTS[fi];
  fn.textContent=f.n;rl.textContent=f.l+':1';rn.textContent=f.nt;
  pillBox.querySelectorAll('.pill').forEach((p,i)=>p.classList.toggle('on',i===fi));
}
function getM(){
  const W=wrap.offsetWidth||window.innerWidth;
  const H=wrap.offsetHeight||window.innerHeight;
  const r=FMTS[fi].r;
  const ah=W/r;
  if(ah<=H){const bh=(H-ah)/2;return{W,H,aW:W,aH:ah,bH:bh,aT:bh,aL:0,mode:'LB'};}
  else{const aw=H*r,bw=(W-aw)/2;return{W,H,aW:aw,aH:H,bH:0,aT:0,aL:bw,mode:'PB'};}
}
function updateBars(){
  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  bt.style.height=bh+'px';bb.style.height=bh+'px';
}
async function initCam(){
  ssBtn.textContent='STARTING…';
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  const tries=[
    {facingMode:{ideal:facing},width:{ideal:3840},height:{ideal:2160}},
    {facingMode:{ideal:facing}},
    true
  ];
  for(const c of tries){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:c,audio:false});
      vid.srcObject=stream;
      vid.classList.toggle('mirror',facing==='user');
      await vid.play();
      ss.style.display='none';
      return;
    }catch{}
  }
  ssBtn.textContent='▶ RETRY';
  ssErr.style.display='block';
  ssErr.innerHTML='CAMERA ACCESS FAILED<br>ALLOW CAMERA IN SAFARI SETTINGS';
}
function draw(){
  if(needSz){cv.width=wrap.offsetWidth||window.innerWidth;cv.height=wrap.offsetHeight||window.innerHeight;needSz=false;}
  ctx.clearRect(0,0,cv.width,cv.height);
  const m=getM();
  const bh=Math.max(m.bH,MIN_BAR);
  const aT=bh,aH=m.H-2*bh,aL=m.aL,aW=m.aW;
  if(bh>m.bH&&m.bH>=0){const ex=bh-m.bH;ctx.fillStyle='rgba(0,0,0,0.58)';ctx.fillRect(aL,aT,aW,ex);ctx.fillRect(aL,aT+aH-ex,aW,ex);}
  if(m.mode==='PB'){ctx.fillStyle='#000';ctx.fillRect(0,0,aL,m.H);ctx.fillRect(aL+aW,0,m.W-(aL+aW),m.H);}
  ctx.strokeStyle='rgba(232,160,48,0.2)';ctx.lineWidth=0.8;
  ctx.strokeRect(aL+0.5,aT+0.5,aW-1,aH-1);
  if(gridOn){
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.6;
    for(let i=1;i<=2;i++){
      const x=aL+aW*i/3;ctx.beginPath();ctx.moveTo(x,aT);ctx.lineTo(x,aT+aH);ctx.stroke();
      const y=aT+aH*i/3;ctx.beginPath();ctx.moveTo(aL,y);ctx.lineTo(aL+aW,y);ctx.stroke();
    }
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let i=1;i<=2;i++)for(let j=1;j<=2;j++){ctx.beginPath();ctx.arc(aL+aW*i/3,aT+aH*j/3,2.2,0,Math.PI*2);ctx.fill();}
    const cx2=aL+aW/2,cy2=aT+aH/2;
    ctx.strokeStyle='rgba(232,160,48,0.65)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx2-14,cy2);ctx.lineTo(cx2+14,cy2);ctx.moveTo(cx2,cy2-14);ctx.lineTo(cx2,cy2+14);ctx.stroke();
    ctx.strokeStyle='rgba(232,160,48,0.28)';ctx.lineWidth=0.7;
    ctx.beginPath();ctx.arc(cx2,cy2,5,0,Math.PI*2);ctx.stroke();
  }
  if(safeOn){
    ctx.setLineDash([5,4]);
    ctx.strokeStyle='rgba(255,200,60,0.42)';ctx.lineWidth=0.8;
    const s1=0.05;ctx.strokeRect(aL+aW*s1,aT+aH*s1,aW*(1-s1*2),aH*(1-s1*2));
    ctx.strokeStyle='rgba(255,110,40,0.42)';
    const s2=0.1;ctx.strokeRect(aL+aW*s2,aT+aH*s2,aW*(1-s2*2),aH*(1-s2*2));
    ctx.setLineDash([]);
    ctx.font='8px "Share Tech Mono"';
    ctx.fillStyle='rgba(255,200,60,0.5)';ctx.fillText('ACTION',aL+aW*s1+3,aT+aH*s1+10);
    ctx.fillStyle='rgba(255,110,40,0.5)';ctx.fillText('TITLE',aL+aW*s2+3,aT+aH*s2+10);
  }
  requestAnimationFrame(draw);
}
function updateStreak(){
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  streak.style.top=(bh+(m.H-2*bh)/2)+'px';
  streak.style.opacity=flareOn?'1':'0';
}
function capture(){
  const vW=vid.videoWidth,vH=vid.videoHeight;
  if(!vW||!vH){showToast('NO VIDEO');return;}
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  const aT=bh,aH=m.H-2*bh,aL=m.aL,aW=m.aW;
  const sc=Math.max(m.W/vW,m.H/vH);
  const ox=(m.W-vW*sc)/2,oy=(m.H-vH*sc)/2;
  const sx=(aL-ox)/sc,sy=(aT-oy)/sc,sw=aW/sc,sh=aH/sc;
  const out=document.createElement('canvas');
  out.width=Math.round(Math.abs(sw));out.height=Math.round(Math.abs(sh));
  const oc=out.getContext('2d');
  if(facing==='user'){oc.translate(out.width,0);oc.scale(-1,1);}
  oc.drawImage(vid,sx,sy,sw,sh,0,0,out.width,out.height);
  flash.style.transition='none';flash.style.opacity='1';
  setTimeout(()=>{flash.style.transition='opacity .1s';flash.style.opacity='0';},80);
  out.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='SCOPE_'+FMTS[fi].l.replace('.','p')+'_'+Date.now()+'.jpg';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    showToast('IMAGE SAVED');
  },'image/jpeg',0.94);
}
function showToast(msg){toast.textContent=msg;toast.style.opacity='1';clearTimeout(ttmr);ttmr=setTimeout(()=>toast.style.opacity='0',2000);}
ssBtn.onclick=initCam;
gridBtn.onclick=()=>{gridOn=!gridOn;gridBtn.classList.toggle('on',gridOn)};
safeBtn.onclick=()=>{safeOn=!safeOn;safeBtn.classList.toggle('on',safeOn)};
flareBtn.onclick=()=>{flareOn=!flareOn;flareBtn.classList.toggle('on',flareOn);updateStreak()};
flipBtn.onclick=()=>{facing=facing==='environment'?'user':'environment';if(stream)initCam()};
capBtn.onclick=capture;
wrap.addEventListener('click',e=>{
  if(e.target.tagName==='BUTTON')return;
  const m=getM();const bh=Math.max(m.bH,MIN_BAR);
  const x=e.clientX,y=e.clientY;
  if(x>=m.aL&&x<=m.aL+m.aW&&y>=bh&&y<=m.H-bh){
    focus.style.left=x+'px';focus.style.top=y+'px';focus.style.opacity='1';
    clearTimeout(ftmr);ftmr=setTimeout(()=>focus.style.opacity='0',1400);
  }
});
const onResize=()=>{needSz=true;updateBars();updateStreak();};
window.addEventListener('resize',onResize);
window.addEventListener('orientationchange',()=>setTimeout(onResize,350));
applyFmt();updateBars();draw();
</script>
</body>
</html>
